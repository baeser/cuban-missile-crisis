<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXCOMM Briefing System — Cuban Missile Crisis 1962</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" id="jspdf-lib" onerror="window.__jsPdfLoadError = true;"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:       #080d08;
      --panel:      #0f1a0f;
      --panel2:     #141f14;
      --border:     #1e3a1e;
      --green-dim:  #3a6a3a;
      --green-mid:  #5a9a5a;
      --green-lit:  #a8d4a8;
      --green-bright:#d4f4d4;
      --amber:      #d4900a;
      --amber-lit:  #f0b030;
      --red:        #c0392b;
      --red-dark:   #8b0000;
      --doc-bg:     #f0e9d8;
      --doc-border: #8b7050;
      --doc-head:   #e4dcc8;
      --doc-text:   #1a1208;
    }

    body {
      background: var(--dark);
      color: var(--green-lit);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── CHROME ──────────────────────────────── */
    .cls-banner {
      background: var(--red-dark);
      color: #fff;
      text-align: center;
      padding: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      font-weight: bold;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hdr-left {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-mid);
      letter-spacing: 2px;
    }

    .hdr-right {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 1px;
    }

    .timeline-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
    }

    .tl-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      margin-right: 6px;
      white-space: nowrap;
    }

    .tl-day {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      white-space: nowrap;
    }

    .tl-day.done  { background: #0a1e0a; color: var(--green-dim); border-color: #1e3a1e; cursor: pointer; }
    .tl-day.done:hover { background: #142814; color: var(--green-lit); border-color: var(--green-mid); }
    .tl-day.now   { background: #1a3a1a; color: var(--green-lit); border-color: var(--green-mid); font-weight: bold; cursor: pointer; }
    .tl-day.now:hover { background: #244a24; }
    .tl-day.future{ opacity: 0.35; }

    .tl-restart {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--red);
      padding: 2px 8px;
      border: 1px solid var(--red-dark);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      margin-left: auto;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .tl-restart:hover { background: rgba(192,57,43,0.15); color: #e06050; border-color: var(--red); }

    /* ── LAYOUT ──────────────────────────────── */
    .main {
      max-width: 860px;
      margin: 30px auto;
      padding: 0 20px 60px;
    }

    /* ── PHASE HEADER ────────────────────────── */
    .ph-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .ph-title {
      font-size: 28px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 12px;
    }

    .ph-context {
      font-size: 15px;
      color: #7ab07a;
      font-style: italic;
      border-left: 3px solid var(--green-dim);
      padding-left: 16px;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    /* ── DOCUMENTS ───────────────────────────── */
    .doc {
      background: var(--doc-bg);
      color: var(--doc-text);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    .doc-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .doc-cls {
      color: var(--red);
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }

    .doc-meta { color: #3a2800; line-height: 1.7; }
    .doc-meta span { display: block; }

    .doc-body {
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.85;
    }

    .doc-body p   { margin-bottom: 10px; }
    .doc-body ul  { margin: 8px 0 10px 22px; }
    .doc-body li  { margin-bottom: 5px; }
    .doc-body strong { font-weight: bold; }

    .doc-sig {
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
      padding: 9px 18px;
      font-style: italic;
      font-size: 13px;
      color: #3a2800;
    }

    .stamp {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 3px solid var(--red);
      color: var(--red);
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      padding: 4px 10px;
      letter-spacing: 3px;
      transform: rotate(-14deg);
      opacity: 0.65;
      pointer-events: none;
    }

    /* ── PHOTO PLACEHOLDER ───────────────────── */
    .photo-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .photo-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--doc-text);
    }

    .photo-head .doc-cls { margin-bottom: 3px; }

    .photo-frame {
      background: #111;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .photo-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .photo-pending {
      color: var(--amber);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-align: center;
      padding: 28px 20px;
      line-height: 2;
    }

    .photo-annotations {
      background: #1a1200;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
    }

    .photo-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── CHOICES ─────────────────────────────── */
    .choice-box {
      margin-top: 32px;
      padding: 24px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 3px;
    }

    .choice-label {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .choice-prompt {
      font-size: 17px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: #90c490;
      padding: 15px 18px;
      margin-bottom: 11px;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      border-radius: 2px;
    }

    .choice-btn:hover {
      background: #142814;
      border-color: var(--green-mid);
      color: var(--green-bright);
    }

    .choice-key {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    /* ── TRANSITION SCREEN ───────────────────── */
    .transition-screen {
      min-height: 62vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .tr-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }

    .tr-title {
      font-size: 24px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .tr-text {
      max-width: 680px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      margin-bottom: 36px;
    }

    .continue-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .continue-btn:hover { background: #244a24; color: var(--green-bright); }

    /* ── INTRO SCREEN ────────────────────────── */
    .intro-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .intro-eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .intro-title {
      font-size: 36px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 8px;
    }

    .intro-sub {
      font-size: 18px;
      color: var(--amber);
      font-family: 'Courier New', monospace;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    .intro-body {
      max-width: 640px;
      margin: 0 auto 40px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      text-align: left;
    }

    .intro-body p { margin-bottom: 14px; }

    .name-label {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 8px;
    }

    .name-input {
      background: var(--panel);
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 11px 18px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      width: 100%;
      max-width: 400px;
      outline: none;
      border-radius: 2px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .name-input::placeholder { color: var(--green-dim); }
    .name-input:focus { border-color: var(--amber); }

    .start-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 14px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .start-btn:hover { background: #244a24; }

    .error-msg {
      color: #e06050;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: 10px;
    }

    /* ── RESOLUTION ──────────────────────────── */
    .outcome-badge {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 18px;
      border: 2px solid;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .outcome-badge.historical { border-color: var(--amber); color: var(--amber-lit); }
    .outcome-badge.diplomatic { border-color: var(--green-mid); color: var(--green-lit); }
    .outcome-badge.escalation { border-color: var(--red); color: #e06050; }

    .compare-box {
      margin-top: 28px;
      padding: 20px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 2px;
    }

    .compare-box h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .choices-summary { margin-bottom: 14px; }

    .choice-row {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: #7ab07a;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'Courier New', monospace;
    }

    .choice-row:last-child { border-bottom: none; }

    .choice-row .phase-tag {
      color: var(--amber);
      min-width: 80px;
    }

    /* ── RATIONALE ───────────────────────────── */
    .rationale-section { }

    .rationale-prompts {
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      padding: 18px 20px;
      margin-bottom: 18px;
      border-radius: 2px;
    }

    .rationale-prompts h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .rationale-prompts ul {
      margin-left: 20px;
      font-size: 14px;
      color: #7ab07a;
      line-height: 1.9;
    }

    .rationale-textarea {
      width: 100%;
      min-height: 280px;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: var(--green-lit);
      padding: 16px;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .rationale-textarea:focus { border-color: var(--amber); }
    .rationale-textarea::placeholder { color: var(--green-dim); font-style: italic; }

    .submit-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .submit-btn:hover { background: #244a24; }

    /* ── COMPLETE SCREEN ─────────────────────── */
    .complete-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .export-btn {
      background: #1a2a3a;
      border: 1px solid #3a6a9a;
      color: #8ab8d8;
      padding: 15px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
      margin-top: 28px;
    }

    .export-btn:hover { background: #1e3448; }
    .export-btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .pdf-warn,
    .pdf-error {
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.7;
    }

    .pdf-warn { color: var(--amber); }
    .pdf-error { color: var(--red); }

    /* ── AUDIO PLAYER ────────────────────────── */
    .audio-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .audio-still {
      width: 100%;
      height: auto;
      display: block;
    }

    .audio-bar {
      background: #1a1200;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 2px solid var(--doc-border);
    }

    .audio-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .audio-bar audio {
      flex: 1;
      height: 32px;
      min-width: 0;
      accent-color: var(--amber);
      filter: sepia(0.4) brightness(0.9);
    }

    .audio-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── LISTEN BUTTON (TTS) ───────────────── */
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--amber);
      color: var(--amber-lit);
      padding: 6px 14px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 2px;
      margin: 8px 0 4px;
      transition: background 0.15s, color 0.15s;
    }
    .listen-btn:hover { background: #1a2a10; color: #ffe070; }
    .listen-btn.speaking {
      background: var(--amber);
      color: #000;
      border-color: var(--amber-lit);
    }
    .listen-btn.speaking:hover { background: var(--amber-lit); }

    /* ── EXPLANATION MODAL ───────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal-box {
      background: var(--panel);
      border: 2px solid var(--amber);
      border-radius: 4px;
      max-width: 600px;
      width: 100%;
      padding: 28px 24px;
      box-shadow: 0 0 60px rgba(240,176,48,0.15);
    }

    .modal-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .modal-title {
      font-size: 18px;
      color: var(--green-lit);
      margin-bottom: 6px;
    }

    .modal-choice {
      font-size: 14px;
      color: var(--amber-lit);
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #1a1200;
      border-left: 3px solid var(--amber);
    }

    .modal-prompt {
      font-size: 14px;
      color: #7ab07a;
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .modal-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--dark);
      border: 1px solid var(--green-dim);
      color: var(--green-lit);
      padding: 12px;
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      resize: vertical;
      border-radius: 2px;
      margin-bottom: 14px;
    }
    .modal-textarea:focus { border-color: var(--amber); }
    .modal-textarea::placeholder { color: var(--green-dim); font-style: italic; }

    .modal-submit {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 11px 28px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
    }
    .modal-submit:hover { background: #244a24; }

    .modal-err {
      color: #e06050;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-bottom: 10px;
    }

    /* ── SCROLLBAR ───────────────────────────── */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #1e3a1e; border-radius: 4px; }

    @media (max-width: 600px) {
      .ph-title { font-size: 22px; }
      .intro-title { font-size: 26px; }
      .choice-btn { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="cls-banner">TOP SECRET — EYES ONLY — EXECUTIVE COMMITTEE OF THE NATIONAL SECURITY COUNCIL</div>

<header>
  <div class="hdr-left">EXCOMM BRIEFING SYSTEM &nbsp;|&nbsp; NSC / WHITEHOUSE</div>
  <div class="hdr-right" id="hdr-date">OCTOBER 1962 &nbsp;|&nbsp; WASHINGTON D.C.</div>
</header>

<div class="timeline-bar" id="timeline">
  <span class="tl-label">DAYS:</span>
  <!-- populated by JS -->
</div>

<div class="main" id="root">
  <!-- rendered by JS -->
</div>

<script>
/* ==========================================================
   STATE
   ========================================================== */
const state = {
  name: '',
  screen: 'intro',
  mode: 'historical',  // 'historical' or 'alternative'
  choices: {},          // phase (1-4) -> 'A' | 'B' | 'C'
  choiceLabels: {},     // phase -> short label for summary
  explanations: {},     // phase -> student's typed explanation (historical mode)
  transition: null,     // { phase, nextScreen }
  rationale: '',
  comprehension: ''
};

const STORAGE_KEY = 'excomm_state_v1';
const UNLOCK_KEY = 'excomm_completed_v1';
const VALID_SCREENS = new Set(['intro', 'phase1', 'transition', 'phase2', 'phase3', 'phase4', 'resolution', 'rationale', 'complete']);

function isAltUnlocked() {
  try { return localStorage.getItem(UNLOCK_KEY) === 'true'; } catch(e) { return false; }
}
function markCompleted() {
  try { localStorage.setItem(UNLOCK_KEY, 'true'); } catch(e) {}
}

function persistState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const snapshot = {
      name: state.name,
      screen: state.screen,
      mode: state.mode,
      choices: state.choices,
      choiceLabels: state.choiceLabels,
      explanations: state.explanations,
      transition: state.transition,
      rationale: state.rationale,
      comprehension: state.comprehension
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  } catch (err) {
    console.warn('Unable to save simulation progress.', err);
  }
}

function loadPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    if (!VALID_SCREENS.has(data.screen)) data.screen = 'intro';
    if (data.screen === 'transition' && (!data.transition || typeof data.transition !== 'object')) {
      data.screen = 'phase1';
    }
    Object.assign(state, {
      name: data.name || '',
      screen: data.screen || 'intro',
      mode: data.mode || 'historical',
      choices: data.choices ? { ...data.choices } : {},
      choiceLabels: data.choiceLabels ? { ...data.choiceLabels } : {},
      explanations: data.explanations ? { ...data.explanations } : {},
      transition: data.transition || null,
      rationale: data.rationale || '',
      comprehension: data.comprehension || ''
    });
  } catch (err) {
    console.warn('Unable to load saved simulation progress.', err);
  }
}

function clearPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (err) {
    console.warn('Unable to clear saved simulation progress.', err);
  }
}

/* ==========================================================
   TEXT-TO-SPEECH (TTS) — "Listen" buttons for accessibility
   ========================================================== */
let _ttsUtterance = null;
let _ttsActiveBtn = null;

function ttsStop() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  if (_ttsActiveBtn) {
    _ttsActiveBtn.classList.remove('speaking');
    _ttsActiveBtn.innerHTML = '&#x1f50a; LISTEN';
    _ttsActiveBtn = null;
  }
  _ttsUtterance = null;
}

function ttsSpeak(btn, text) {
  if (!window.speechSynthesis) return;

  // If this button is already speaking, stop it
  if (_ttsActiveBtn === btn) {
    ttsStop();
    return;
  }

  // Stop any current speech
  ttsStop();

  // Clean text: strip HTML tags, decode entities, collapse whitespace
  const clean = text
    .replace(/<[^>]*>/g, ' ')
    .replace(/&nbsp;/g, ' ')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"')
    .replace(/&#x27;/g, "'")
    .replace(/\s+/g, ' ')
    .trim();

  _ttsUtterance = new SpeechSynthesisUtterance(clean);
  _ttsUtterance.rate = 0.92;
  _ttsUtterance.pitch = 1.0;

  _ttsActiveBtn = btn;
  btn.classList.add('speaking');
  btn.innerHTML = '&#9632; STOP';

  _ttsUtterance.onend = () => ttsStop();
  _ttsUtterance.onerror = () => ttsStop();

  window.speechSynthesis.speak(_ttsUtterance);
}

function listenBtn(targetId) {
  return `<button class="listen-btn" onclick="ttsSpeak(this, document.getElementById('${targetId}').innerText)">&#x1f50a; LISTEN</button>`;
}

// Stop TTS when navigating between screens
const _origSetRoot = setRoot;
setRoot = function(html) {
  ttsStop();
  _origSetRoot(html);
};

/* ==========================================================
   TIMELINE
   ========================================================== */
const DAYS = [
  { label:'OCT 16', phase:1 },
  { label:'OCT 17', phase:1 },
  { label:'OCT 18', phase:2 },
  { label:'OCT 19', phase:2 },
  { label:'OCT 20', phase:2 },
  { label:'OCT 21', phase:2 },
  { label:'OCT 22', phase:3 },
  { label:'OCT 23', phase:3 },
  { label:'OCT 24', phase:3 },
  { label:'OCT 25', phase:3 },
  { label:'OCT 26', phase:4 },
  { label:'OCT 27', phase:4 },
  { label:'OCT 28', phase:5 },
];

const PHASE_SCREENS = { 1: 'phase1', 2: 'phase2', 3: 'phase3', 4: 'phase4', 5: 'resolution' };

function getHighestVisitedPhase() {
  // Determine highest phase the student has reached based on choices made + current screen
  const choicePhases = Object.keys(state.choices).map(Number);
  let highest = choicePhases.length > 0 ? Math.max(...choicePhases) : 0;
  // If they're on a phase screen, that phase is also visited
  const screenPhaseMap = { phase1:1, phase2:2, phase3:3, phase4:4, resolution:5, rationale:5, complete:5 };
  const currentPhase = screenPhaseMap[state.screen] || 0;
  return Math.max(highest, currentPhase);
}

function navigateToPhase(phase) {
  const screen = PHASE_SCREENS[phase];
  if (!screen) return;
  state.screen = screen;
  state.transition = null;
  render();
}

function renderTimeline(activePhase) {
  const tl = document.getElementById('timeline');
  const highestVisited = getHighestVisitedPhase();
  const showRestart = state.screen !== 'intro';

  tl.innerHTML = '<span class="tl-label">DAYS:</span>' +
    DAYS.map(d => {
      let cls = 'tl-day ';
      const canClick = d.phase <= highestVisited;
      if (d.phase < activePhase) cls += 'done';
      else if (d.phase === activePhase) cls += 'now';
      else cls += 'future';
      if (canClick && d.phase !== activePhase && d.phase < activePhase) {
        return `<span class="${cls}" onclick="navigateToPhase(${d.phase})" title="Return to Phase ${d.phase}">${d.label}</span>`;
      }
      return `<span class="${cls}">${d.label}</span>`;
    }).join('') +
    (showRestart ? '<button class="tl-restart" onclick="confirmRestart()">↺ RESTART</button>' : '');
}

function confirmRestart() {
  if (confirm('Restart the simulation? All choices and progress will be cleared.')) {
    resetSim();
  }
}

/* ==========================================================
   RENDER DISPATCH
   ========================================================== */
function render() {
  persistState();
  scrollTop();
  switch (state.screen) {
    case 'intro':      renderIntro();      break;
    case 'phase1':     renderPhase1();     break;
    case 'transition': renderTransitionScreen(); break;
    case 'phase2':     renderPhase2();     break;
    case 'phase3':     renderPhase3();     break;
    case 'phase4':     renderPhase4();     break;
    case 'resolution': renderResolution(); break;
    case 'rationale':  renderRationale();  break;
    case 'complete':   renderComplete();   break;
  }
}

function calculateAltOutcome() {
  const c = state.choices;
  let agg = 0, dip = 0;
  if (c[1] === 'A') agg += 2;
  if (c[1] === 'C') dip += 2;
  if (c[2] === 'B') agg += 2;
  if (c[2] === 'C') dip += 1;
  if (c[3] === 'A') agg += 1;
  if (c[3] === 'C') dip += 1;
  if (c[4] === 'C') agg += 3;
  if (c[4] === 'B') dip += 1;
  if (agg >= 4) return 'escalation';
  if (dip >= 3 && agg <= 1) return 'diplomatic';
  return 'near_miss';
}

let _pendingChoice = null; // { phase, choice }

function makeChoice(phase, choice) {
  _pendingChoice = { phase, choice };
  state.choices[phase] = choice;
  state.choiceLabels[phase] = LABEL_MAP[phase][choice];
  persistState();

  // ALTERNATIVE MODE — skip modal, go straight to transition
  if (state.mode === 'alternative') {
    const nextScreens = { 1: 'phase2', 2: 'phase3', 3: 'phase4', 4: 'resolution' };
    state.transition = { phase: phase, nextScreen: nextScreens[phase] };
    state.screen = 'transition';
    _pendingChoice = null;
    render();
    return;
  }

  // HISTORICAL MODE — show explanation modal
  const label = LABEL_MAP[phase][choice];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'explanation-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-label">DECISION RECORDED — PHASE ${phase}</div>
      <div class="modal-title">Explain Your Reasoning</div>
      <div class="modal-choice">Your recommendation: <strong>${esc(label)}</strong></div>
      <div class="modal-prompt">In 2–3 sentences, explain <em>why</em> you chose this option. What factors from the documents influenced your decision?</div>
      <div id="modal-err" class="modal-err"></div>
      <textarea class="modal-textarea" id="modal-explanation" placeholder="I chose this because..."></textarea>
      <button class="modal-submit" onclick="submitExplanation()">▶ &nbsp; SUBMIT &amp; SEE WHAT ACTUALLY HAPPENED</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('modal-explanation').focus();
}

function submitExplanation() {
  const text = document.getElementById('modal-explanation').value.trim();
  if (text.length < 15) {
    document.getElementById('modal-err').textContent = '⚠ Please write at least a couple sentences explaining your reasoning.';
    return;
  }

  const phase = _pendingChoice.phase;
  state.explanations[phase] = text;

  // Remove modal
  const modal = document.getElementById('explanation-modal');
  if (modal) modal.remove();

  // Go to transition screen
  const nextScreens = { 1: 'phase2', 2: 'phase3', 3: 'phase4', 4: 'resolution' };
  state.transition = { phase: phase, nextScreen: nextScreens[phase] };
  state.screen = 'transition';
  _pendingChoice = null;
  render();
}

    return `<div class="choice-row">
      <span class="phase-tag">${icon} PH ${p.num}:</span>
      <span>You: <strong>${esc(yours)}</strong> &nbsp;|&nbsp; Kennedy: <strong>${esc(hist.label)}</strong></span>
    </div>`;
  }).join('');

  setRoot(`
    <div class="ph-meta">SUNDAY, OCTOBER 28, 1962 &nbsp;—&nbsp; CRISIS RESOLUTION</div>
    <div class="ph-title">The Outcome: How the Crisis Ended</div>

    <div class="doc">
      <div class="doc-body" id="resolution-text" style="font-size:15px; line-height:1.9;">
        <p>On the morning of October 28th, Khrushchev's message came through Radio Moscow: the Soviet Union would dismantle and return its missiles from Cuba. The thirteen days were over.</p>
        <p>The deal: the United States pledged not to invade Cuba. The Soviet missiles were withdrawn under UN inspection by November 1962. Secretly — and this would not become public for decades — the U.S. agreed to remove its Jupiter missiles from Turkey within six months. They were quietly dismantled in April 1963.</p>
        <p>The crisis produced lasting consequences. A direct "hotline" was installed between Washington and Moscow so that future leaders would never have to communicate through slow diplomatic cables in moments when minutes counted. Within a year, the United States, Soviet Union, and United Kingdom signed the Partial Nuclear Test Ban Treaty — the first major arms control agreement of the Cold War.</p>
        <p><strong>What you did not know — and neither did EXCOMM:</strong></p>
        <p>Remember submarine B-59, the Foxtrot-class boat you saw in the Phase 3 intelligence photos? Here is what was happening inside it.</p>
        <p>After being depth-charged for hours with no radio contact from Moscow, the submarine's commander — Captain Valentin Savitsky — became convinced that nuclear war had already begun on the surface. He ordered B-59's nuclear torpedo armed and prepared for launch against the American destroyers above. The torpedo carried a warhead equivalent to the Hiroshima bomb.</p>
        <p>Soviet naval regulations required the unanimous agreement of three senior officers to authorize a nuclear launch. Two agreed. The third — Fleet Commodore Vasili Arkhipov — refused. He argued they should surface and await orders from Moscow. He was shouted at, accused of cowardice. He still refused.</p>
        <p><strong>One man's refusal, in the dark, under attack, believing the world was already at war — is the reason civilization continued.</strong> No one in the White House, the Pentagon, or the Kremlin knew this had happened. The story did not become public until Russian archives were opened in 2002, forty years later.</p>
      </div>
    </div>
    ${listenBtn('resolution-text')}

    <div class="compare-box">
      <h3>YOUR DECISIONS vs. KENNEDY'S DECISIONS</h3>
      <div class="choices-summary">${comparisonRows}</div>
    </div>

    <div style="text-align:center; margin-top:36px;">
      <button class="continue-btn" onclick="goToRationale()">▶ &nbsp; WRITE YOUR FINAL ANALYSIS</button>
    </div>
  `);
}

function goToRationale() {
  state.screen = 'rationale';
  render();
}

/* ==========================================================
   RATIONALE INPUT
   ========================================================== */
function renderRationale() {
  renderTimeline(5);
  setRoot(`
    <div class="ph-meta">FINAL REPORT — ${esc(state.name)}</div>
    <div class="ph-title">Your Final Analysis</div>

    <!-- QUESTION 1: REFLECTION -->
    <div class="rationale-prompts">
      <h3>QUESTION 1 — REFLECTION ON YOUR CHOICES</h3>
      <p style="font-size:14px; color:#7ab07a; line-height:1.8; margin-top:8px;">Look back at the four decisions you made during the simulation. Which decision was the hardest for you, and why? If any of your choices were different from what Kennedy actually did, explain whether — after seeing what really happened — you would change your recommendation or stick with it.</p>
    </div>

    <textarea
      class="rationale-textarea"
      id="rationale-text"
      placeholder="The hardest decision for me was..."
      oninput="handleRationaleInput(this.value)"
      style="min-height:200px;"
    >${esc(state.rationale)}</textarea>

    <!-- QUESTION 2: COMPREHENSION CHECK -->
    <div class="rationale-prompts" style="margin-top:8px;">
      <h3>QUESTION 2 — CHECK FOR UNDERSTANDING</h3>
      <p style="font-size:14px; color:#7ab07a; line-height:1.8; margin-top:8px;">The Cuban Missile Crisis was resolved without nuclear war. Based on what you read in this simulation, identify <strong>two specific reasons</strong> why. One should involve a decision made by a leader (Kennedy, Khrushchev, or someone else), and one should involve something that was <em>not</em> planned or controlled by any leader.</p>
    </div>

    <textarea
      class="rationale-textarea"
      id="comprehension-text"
      placeholder="Two reasons the crisis was resolved without nuclear war..."
      oninput="handleComprehensionInput(this.value)"
      style="min-height:200px;"
    >${esc(state.comprehension)}</textarea>

    <div id="rationale-err" class="error-msg" style="margin-bottom:12px;"></div>
    <button class="submit-btn" onclick="submitRationale()">▶ &nbsp; SUBMIT &amp; GENERATE REPORT</button>
  `);
}

function submitRationale() {
  const r = document.getElementById('rationale-text').value.trim();
  const c = document.getElementById('comprehension-text').value.trim();
  if (r.length < 30) {
    document.getElementById('rationale-err').textContent = '⚠ Please write a more complete answer to Question 1 (at least a few sentences).';
    return;
  }
  if (c.length < 30) {
    document.getElementById('rationale-err').textContent = '⚠ Please write a more complete answer to Question 2 (at least a few sentences).';
    return;
  }
  state.rationale = r;
  state.comprehension = c;
  state.screen = 'complete';
  render();
}

function handleRationaleInput(value) {
  state.rationale = value;
  persistState();
}

function handleComprehensionInput(value) {
  state.comprehension = value;
  persistState();
}

/* ==========================================================
   COMPLETE SCREEN
   ========================================================== */
function renderComplete() {
  renderTimeline(5);

  // In historical mode, mark as completed to unlock alt-history
  if (state.mode === 'historical') markCompleted();

  // Alt-history mode has no PDF
  if (state.mode === 'alternative') {
    setRoot(`
      <div class="complete-screen">
        <div class="intro-eyebrow" style="color:var(--red);">ALTERNATIVE HISTORY — SIMULATION COMPLETE</div>
        <div class="intro-title" style="margin-bottom:10px;">Timeline Closed</div>
        <div class="intro-sub" style="margin-bottom:30px;">YOUR VERSION OF OCTOBER 1962</div>
        <div class="intro-body" style="text-align:center;">
          <p>You've explored one alternative path through the Cuban Missile Crisis. Every choice created a different chain of events — a different world.</p>
          <p style="color:var(--amber);">Try again with different choices to see how other timelines unfold.</p>
        </div>
        <button class="continue-btn" onclick="resetSim()">&#9889; &nbsp; PLAY AGAIN</button>
      </div>
    `);
    return;
  }

  const pdfReady = isPdfReady();
  const pdfErrored = Boolean(window.__jsPdfLoadError);
  const exportAttrs = (!pdfReady || pdfErrored) ? 'disabled aria-disabled=\"true\"' : '';
  let pdfStatus = '';
  if (pdfErrored) {
    pdfStatus = '<p class=\"pdf-error\">PDF generator failed to load. Check your connection and reload the page to try again.</p>';
  } else if (!pdfReady) {
    pdfStatus = '<p class=\"pdf-warn\">PDF generator is still loading. Once it finishes, the download button will unlock automatically.</p>';
  }
  setRoot(`
    <div class="complete-screen">
      <div class="intro-eyebrow">SIMULATION COMPLETE</div>
      <div class="intro-title" style="margin-bottom:10px;">Advisory Report Ready</div>
      <div class="intro-sub" style="margin-bottom:30px;">EXCOMM — OCTOBER 1962</div>
      <div class="intro-body" style="text-align:center;">
        <p>Your advisory record has been logged. Click below to download a PDF report of your choices, the simulation outcome, and your written analysis.</p>
        <p style="color:var(--amber);">Save this file and submit it to your teacher as directed.</p>
        <p style="color:var(--green-mid); font-style:italic; margin-top:12px;">&#9889; Alternative History mode has been unlocked. Return to the start screen to try it.</p>
      </div>
      <button class="export-btn" onclick="exportPDF()" ${exportAttrs}>⬇ &nbsp; DOWNLOAD PDF REPORT</button>
      ${pdfStatus}
      <br><br>
      <button class="continue-btn" style="margin-top:10px;" onclick="resetSim()">↺ &nbsp; RESTART SIMULATION</button>
    </div>
  `);
}

function resetSim() {
  Object.assign(state, {
    name: '', screen: 'intro', mode: 'historical', choices: {}, choiceLabels: {},
    explanations: {}, transition: null, rationale: '', comprehension: ''
  });
  clearPersistedState();
  render();
}

/* ==========================================================
   PDF EXPORT
   ========================================================== */
function exportPDF() {
  if (!isPdfReady()) {
    const msg = window.__jsPdfLoadError
      ? 'The PDF generator could not be loaded. Please check your internet connection and reload the page.'
      : 'The PDF generator is still loading. Please wait a moment and try again.';
    alert(msg);
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  const PW = 612, PH = 792;
  const ML = 60, MR = 60, MT = 60;
  const TW = PW - ML - MR;
  let y = MT;

  const LINE = (x1, y1, x2, y2, r, g, b) => {
    doc.setDrawColor(r, g, b);
    doc.line(x1, y1, x2, y2);
  };

  const TEXT = (text, x, yPos, size, r, g, b, style = 'normal', align = 'left') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    doc.text(text, x, yPos, { align });
  };

  const BLOCK = (text, x, yPos, maxW, size, r, g, b, style = 'normal') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    const lines = doc.splitTextToSize(text, maxW);
    doc.text(lines, x, yPos);
    return lines.length * (size * 1.35);
  };

  function checkPage(needed = 40) {
    if (y + needed > PH - 50) {
      doc.addPage();
      y = MT;
    }
  }

  const startAnalysisPage = (isContinuation = false) => {
    doc.addPage();
    doc.setFillColor(139, 0, 0);
    doc.rect(0, 0, PW, 28, 'F');
    TEXT('TOP SECRET — EYES ONLY', PW / 2, 18, 8, 255, 255, 255, 'bold', 'center');

    y = 65;
    const heading = isContinuation ? 'SECTION II — STUDENT ANALYSIS (CONT.)' : 'SECTION II — STUDENT ANALYSIS';
    TEXT(heading, ML, y, 14, 30, 60, 30, 'bold');
    y += 6;
    LINE(ML, y, PW - MR, y, 150, 130, 90);
    y += 18;

    if (!isContinuation) {
      TEXT(`Advisor: ${state.name}`, ML, y, 11, 80, 60, 0);
      y += 26;
    }
  };

  // ── PAGE 1: COVER ────────────────────────────────────────
  // Red top banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, 0, PW, 28, 'F');
  TEXT('TOP SECRET — EYES ONLY — EXECUTIVE COMMITTEE OF THE NATIONAL SECURITY COUNCIL',
    PW / 2, 18, 7.5, 255, 255, 255, 'bold', 'center');

  y = 70;
  LINE(ML, y, PW - MR, y, 60, 30, 0);
  y += 16;
  TEXT('ADVISORY SIMULATION REPORT', PW / 2, y, 11, 100, 70, 0, 'normal', 'center');
  y += 8;
  LINE(ML, y, PW - MR, y, 60, 30, 0);

  y += 50;
  TEXT('CUBAN MISSILE CRISIS', PW / 2, y, 28, 30, 60, 30, 'bold', 'center');
  y += 32;
  TEXT('EXCOMM Advisory Simulation', PW / 2, y, 16, 60, 100, 60, 'italic', 'center');
  y += 14;
  TEXT('October 16 – 28, 1962', PW / 2, y, 13, 80, 60, 0, 'normal', 'center');

  y += 50;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  y += 24;
  TEXT('STUDENT ADVISOR:', ML, y, 11, 80, 60, 0, 'bold');
  y += 17;
  TEXT(state.name, ML + 20, y, 15, 20, 20, 20, 'bold');

  y += 24;
  TEXT('SIMULATION DATE:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), ML + 20, y, 12, 40, 40, 40);

  // Count how many matched history
  const matchCount = [1,2,3,4].filter(p => state.choices[p] === HISTORICAL[p].choice).length;
  y += 24;
  TEXT('HISTORICAL ALIGNMENT:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(`${matchCount} of 4 decisions matched Kennedy's actual choices`, ML + 20, y, 12, 40, 40, 40);

  y += 45;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  // ── ADVISORY RECORD ──
  y += 28;
  TEXT('SECTION I — ADVISORY RECORD', ML, y, 14, 30, 60, 30, 'bold');
  y += 6;
  LINE(ML, y, PW - MR, y, 150, 130, 90);
  y += 18;

  const phaseData = [
    { num: 1, date: 'Oct 16', label: 'Initial Response to Discovery' },
    { num: 2, date: 'Oct 17–19', label: 'Kennedy\'s Public Address' },
    { num: 3, date: 'Oct 22–25', label: 'Soviet Ships at Quarantine Line' },
    { num: 4, date: 'Oct 27', label: 'Black Saturday Response' }
  ];

  phaseData.forEach(ph => {
    checkPage(90);
    TEXT(`PHASE ${ph.num} — ${ph.date}`, ML, y, 10, 139, 0, 0, 'bold');
    y += 13;
    TEXT(`Decision Point: ${ph.label}`, ML + 10, y, 10, 60, 50, 0);
    y += 13;
    const choice = state.choiceLabels[ph.num] || 'N/A';
    const hist = HISTORICAL[ph.num];
    const matched = state.choices[ph.num] === hist.choice;
    TEXT(`Your Recommendation: ${choice}`, ML + 10, y, 11, 20, 20, 20, 'bold');
    y += 13;
    TEXT(`Kennedy's Decision: ${hist.label}${matched ? ' ✓ MATCH' : ''}`, ML + 10, y, 10, 80, 60, 0);
    y += 14;
    // Student explanation
    const explanation = state.explanations[ph.num];
    if (explanation) {
      const eh = BLOCK(`Student reasoning: "${explanation}"`, ML + 10, y, TW - 10, 10, 60, 60, 60, 'italic');
      y += eh + 6;
    }
    LINE(ML, y, PW - MR, y, 200, 190, 170);
    y += 14;
  });

  // ── PAGE 2: STUDENT ANALYSIS ────────────────────────────
  startAnalysisPage(false);

  const lineHeight = 12 * 1.35;

  function writeBlock(label, text) {
    checkPage(60);
    TEXT(label, ML, y, 11, 139, 0, 0, 'bold');
    y += 16;
    const clean = (text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim() || 'No response submitted.';
    const lines = doc.splitTextToSize(clean, TW);
    doc.setFontSize(12);
    doc.setTextColor(20, 20, 20);
    doc.setFont('times', 'normal');
    lines.forEach(line => {
      if (y + lineHeight > PH - 60) {
        startAnalysisPage(true);
        doc.setFontSize(12);
        doc.setTextColor(20, 20, 20);
        doc.setFont('times', 'normal');
      }
      doc.text(line, ML, y);
      y += lineHeight;
    });
    y += 16;
  }

  writeBlock('QUESTION 1 — REFLECTION ON YOUR CHOICES', state.rationale);
  writeBlock('QUESTION 2 — CHECK FOR UNDERSTANDING', state.comprehension);

  y += 14;

  // Footer on last page
  checkPage(60);
  LINE(ML, y, PW - MR, y, 180, 160, 120);
  y += 16;
  TEXT('Cuban Missile Crisis EXCOMM Simulation — Educational Use Only', PW / 2, y, 9, 120, 100, 60, 'italic', 'center');
  y += 13;
  TEXT(`Based on declassified historical records. Completed: ${new Date().toLocaleString()}`, PW / 2, y, 9, 120, 100, 60, 'italic', 'center');

  // Red bottom banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, PH - 24, PW, 24, 'F');
  TEXT('TOP SECRET — EYES ONLY', PW / 2, PH - 9, 8, 255, 255, 255, 'bold', 'center');

  // Save
  const fname = `EXCOMM_Report_${state.name.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
  doc.save(fname);
}

/* ==========================================================
   INIT
   ========================================================== */
loadPersistedState();
render();
window.addEventListener('load', () => {
  if (state.screen === 'complete' && isPdfReady()) {
    render();
  }
});
</script>
</body>
</html>
