    epilogue: `<p>Kennedy got on the hotline at 7:02 AM. Khrushchev answered at 7:04. For forty-seven minutes, the two most powerful men on Earth shouted, pleaded, and bargained with the fate of civilization hanging on a telephone wire stretched across the Atlantic.</p><p>"Your field commander used a weapon that belongs to humanity, not to any army," Kennedy said. "Mine will not respond in kind. But I need you to order an immediate ceasefire — all Soviet forces in Cuba, right now — or I cannot control what happens next."</p><p>Khrushchev agreed. Soviet forces in Cuba received the ceasefire order at 8:15 AM. American forces received theirs at 8:22. The silence that followed felt like the world remembering how to breathe.</p><p>The aftermath was devastating. 3,000 American soldiers dead at Tarará Beach. 147 Soviet soldiers killed in the initial air strikes. Radiation from the tactical warhead made a 12-mile stretch of Cuban coastline uninhabitable for decades. Both governments fell within two years — Kennedy lost the 1964 election to Goldwater; Khrushchev was deposed by the Politburo in early 1963.</p><p>But the missiles came out. A hotline was installed. And a Nuclear Weapons Convention — far stronger than anything the real timeline produced — was signed in Geneva in 1964, banning tactical nuclear weapons worldwide. The horror of Tarará Beach ensured that no nuclear weapon was ever used in combat again.</p>` },

  end_conventional: { conclusion: true, title: 'November 1962 — The Long War in Cuba',
    epilogue: `<p>The conventional counterattack was devastating. Within 72 hours, every Soviet military installation in Cuba was destroyed or overrun. But Cuba was not like any war America had fought before. 270,000 Cuban troops and militia fought with desperate ferocity. The jungles and mountains of the Sierra Maestra became a quagmire that swallowed division after division.</p><p>Khrushchev, denied the excuse of American nuclear first-use, found himself unable to escalate without appearing the aggressor. He withdrew Soviet personnel in December under a face-saving UN arrangement. The missiles were gone — but America was now occupying a hostile island 90 miles from Florida, fighting an insurgency that would last years.</p><p>Castro became a martyr-in-exile, broadcasting from Mexico City. The occupation of Cuba became America\'s first Vietnam — a grinding, unpopular war that consumed Kennedy\'s second term and defined a generation. The missiles were gone. The price was everything else.</p>` },

  end_bitter_peace: { conclusion: true, title: 'November 1962 — The Apology',
    epilogue: `<p>Kennedy went on national television on November 3rd and delivered the most painful speech of his presidency. "The United States regrets the loss of life resulting from military operations in Cuba. We reaffirm our commitment to resolving disputes through peaceful means." He did not use the word "apology." Khrushchev claimed it was one anyway.</p><p>The Jupiter missiles left Turkey by January. The Soviet missiles left Cuba by December. The deal held. But it cost Kennedy everything — his approval rating dropped thirty points overnight. "He apologized to the Communists" became the rallying cry that put Barry Goldwater in the White House in 1964.</p><p>In Moscow, Khrushchev was hailed as the leader who made America bow. He survived the Politburo challenges that, in another timeline, would have ended his career. The Cold War continued — but the balance of fear had shifted, and everyone knew it.</p>` },

  end_half_deal: { conclusion: true, title: 'December 1962 — The Secret and the Cost',
    epilogue: `<p>The deal was struck in shadows. Turkey missiles removed over six months. No-invasion pledge delivered through diplomatic channels. No public apology. Khrushchev accepted the half-loaf and ordered the missiles withdrawn.</p><p>But the air strikes could not be un-struck. 147 Soviet graves in Cuban soil became a monument in Moscow — "The Heroes of Cuba." Every October, Pravda published photographs of the destruction. The Cold War grew colder. Arms negotiations, which might have begun in 1963, didn't start until 1972. The test ban treaty was never signed.</p><p>Kennedy won re-election in 1964 on a wave of patriotic support. But he knew, privately, what it had cost. "We hit them first," he told Bobby late one night. "That's what history will remember. Not the deal — the strikes." He was right.</p>` },

  end_brinkmanship: { conclusion: true, title: 'October 24, 1962 — The Silence Before',
    epilogue: `<p>Khrushchev received the ultimatum — remove the surviving missiles in 48 hours or face a second wave of strikes — and did something nobody in Washington expected. He went on Radio Moscow and released the full text of the ultimatum to the world, alongside photographs of the American destruction in Cuba.</p><p>"The war criminals of Washington are not satisfied with the blood they have already spilled," he declared. "Now they threaten to finish the job."</p><p>World opinion, which had been cautiously sympathetic to America, turned overnight. The UN General Assembly voted 89-12 to condemn the United States. NATO allies began publicly distancing themselves. Kennedy, who had held all the military cards, found himself diplomatically isolated. The 48-hour deadline passed without action — the President could not launch a second strike with the whole world watching.</p><p>The surviving missile sites became operational on October 29th. Soviet nuclear weapons, armed and targeted at American cities, remained in Cuba until a negotiated withdrawal in March 1963 — on Khrushchev's terms.</p>` },

  end_force_then_peace: { conclusion: true, title: 'November 1962 — The Reluctant Peace',
    epilogue: `<p>The combination of force and diplomacy produced an ugly but functional peace. The no-further-strikes pledge satisfied Khrushchev's need to show Moscow he hadn't simply surrendered. The missiles were withdrawn under UN inspection by December. The three surviving sites were dismantled last.</p><p>It was not a clean victory. The strikes had killed Soviet soldiers, and Moscow's propaganda machine made sure the world never forgot it. But the quarantine had shown restraint, and the negotiation had shown wisdom. Kennedy's reputation survived — barely — as the leader who knew when to stop hitting.</p><p>In Havana, Castro never forgave either superpower for treating his island as a chessboard. Cuba became the most heavily armed non-nuclear state on Earth, a bristling fortress that neither side could ignore. The Cold War went on. But both sides had learned something about the distance between the first punch and the last.</p>` },

  end_inspection_deal: { conclusion: true, title: 'December 1962 — Trust, But Verify',
    epilogue: `<p>The inspection regime became the crisis after the crisis. Soviet technicians dismantled missiles under the watchful eyes of UN observers — and the constant surveillance of U-2 aircraft overhead. Castro, humiliated by inspectors on his soil, refused to cooperate for weeks. Eventually, Soviet pressure forced his hand.</p><p>By February 1963, every missile was gone. The inspection framework became a model — imperfect, contentious, but real — for arms control agreements that followed. The phrase "trust, but verify" entered the diplomatic lexicon.</p><p>The strikes were not forgotten. But the inspections proved that verification was possible, that enemies could watch each other disarm without firing another shot. It was not the outcome anyone had wanted. It was the outcome the world needed.</p>` },

  end_overreach: { conclusion: true, title: 'October 28, 1962 — The Miscalculation',
    epilogue: `<p>Khrushchev's offer was rejected. The demand for unconditional removal reached Moscow at 3 AM. Khrushchev read it and turned to Malinovsky: "They want us on our knees." The moderate faction in the Presidium, which had been arguing for compromise, went silent. The hardliners took the floor.</p><p>By dawn, the order went out: Soviet forces in Cuba were authorized to treat any American military action as an act of war and respond accordingly. The tactical nuclear weapons — the Luna rockets that the CIA didn't know about — were armed and targeted at Guantánamo Bay and any invasion beach.</p><p>Kennedy, unaware of how badly he had miscalculated, ordered a second wave of strikes on October 29th. The first American bombs hit at 0600. At 0614, a Luna rocket launched from a palm grove near Trinidad destroyed the airfield at Guantánamo. 2,200 Americans died in the blast. The world was eight minutes from a general nuclear exchange before Khrushchev, horrified by what his own authorization had unleashed, called the White House directly and begged for a ceasefire.</p><p>The ceasefire held. But Guantánamo was gone, and with it, any illusion that nuclear brinkmanship had a safe edge to walk along.</p>` },

  end_two_front_crisis: { conclusion: true, title: 'November 1962 — The Double Game',
    epilogue: `<p>For eleven days, the world teetered on two edges simultaneously. Soviet tanks sat at the Berlin checkpoints while American destroyers circled Cuba. NATO mobilized along the East German border. The Warsaw Pact went to full alert. Two million soldiers on both sides waited for orders that never came.</p><p>The resolution came not through grand diplomacy but through exhaustion. Khrushchev, unable to sustain confrontations on two fronts, quietly reopened the Berlin checkpoints on November 2nd — claiming "routine maintenance" had been completed. The Cuba quarantine held. The missiles were withdrawn by December under a face-saving UN arrangement.</p><p>No deal was ever officially acknowledged. Both sides simply... stopped. The crisis ended not with a handshake but with a mutual, unspoken agreement that the alternative was too terrible to pursue. It was the most frightening month in human history. Both sides pretended afterward that they had been in control the entire time. Neither had been.</p>` },

  end_grand_bargain: { conclusion: true, title: 'November 1962 — The Package Deal',
    epilogue: `<p>The deal that ended both crises simultaneously became known as "The Grand Bargain" — though at the time, it felt more like mutual desperation. Cuba missiles out. Turkey missiles out. Berlin checkpoints open. Both sides pledge non-aggression in their respective spheres. All wrapped in a single agreement, signed at the United Nations, broadcast worldwide.</p><p>It was the most comprehensive superpower agreement of the Cold War — and the most controversial. Hawks in Washington called it surrender. Hardliners in Moscow called it retreat. Both were partly right.</p><p>But something shifted in the weeks that followed. A hotline connected the White House and Kremlin. A test ban treaty was signed before Christmas. The world had looked into the abyss across two continents simultaneously and decided, collectively, to step back. The Grand Bargain didn't end the Cold War. But it changed the rules — from a game both sides played to win, to one both sides played to survive.</p>` },

  end_berlin_first: { conclusion: true, title: 'December 1962 — The Slow Unraveling',
    epilogue: `<p>Easing pressure on Cuba to resolve Berlin first seemed logical in the moment. Berlin was the more dangerous flashpoint — a city where American and Soviet tanks had literally faced each other across a checkpoint. The Berlin situation de-escalated within days once the quarantine pressure eased.</p><p>But the Cuba problem metastasized. With enforcement relaxed, the Kimovsk docked at Mariel and delivered its guidance systems. By November, all missile sites were operational. Soviet nuclear weapons, aimed at American cities, sat 90 miles from Florida for the next four months while increasingly desperate negotiations dragged on.</p><p>The missiles finally left in February 1963, traded for a no-invasion pledge, Turkey missile removal, AND a U.S. agreement to close its listening posts in Iran. Khrushchev, who had achieved far more than he'd originally hoped, declared it "a victory for peace." In Washington, the recriminations lasted years. The lesson was bitter: in a crisis with two fronts, the one you neglect becomes the one that defines your legacy.</p>` },

  end_trollope_win: { conclusion: true, title: 'October 28, 1962 — Morning in Moscow',
    epilogue: `<p>Kennedy's reply — addressed only to Khrushchev's first, personal letter — arrived in Moscow at dawn. It accepted the terms: a no-invasion pledge for missile withdrawal. The second letter, with its demand for Turkey, was treated as if it had never existed.</p><p>Khrushchev read the reply alone in his study. His hands trembled. He called for his secretary and began dictating the most important broadcast of his life: "The Soviet Government has given instructions for the dismantling of weapons which you call offensive, and their crating and return to the Soviet Union."</p><p>Radio Moscow broadcast the message at 9 AM. In the White House, Kennedy turned to his brother and said: "This is not the time to gloat." Bobby Kennedy had already called Dobrynin: the Turkey missiles would be gone in six months. They were — quietly, without announcement, as if they had simply rusted away.</p><p>No one knew how close it had really been. Beneath the Atlantic, the crew of submarine B-59 had spent their last conscious hours deciding whether to end the world. Fleet Commodore Arkhipov's refusal to authorize the nuclear torpedo would not become public for forty years. By then, most of the men who had nearly died — on all sides — were already gone.</p>` },

  end_public_trade: { conclusion: true, title: 'October 29, 1962 — The Honest Deal',
    epilogue: `<p>Kennedy went on television at 8 PM: "The United States and the Soviet Union have reached an agreement. Soviet offensive weapons will be removed from Cuba. American Jupiter missiles will be removed from Turkey. Both nations pledge to respect each other's security concerns in their respective regions."</p><p>The reaction was volcanic. NATO allies felt betrayed. Senator Goldwater called it "the greatest act of appeasement since Munich." Khrushchev, for once, said nothing negative — the public acknowledgment of equivalence was more than he had dared hope for.</p><p>But something unexpected grew from the honesty. For the first time, both superpowers had publicly admitted that the other side had legitimate fears. That admission — grudging, painful, politically costly — became the foundation for a different kind of Cold War. Arms talks began in March 1963. A comprehensive test ban was signed by December. The hotline was installed within weeks.</p><p>Kennedy lost twenty points in the polls. He won re-election anyway, by four points, on the argument that honesty in the nuclear age was not weakness — it was the only sane policy. History, eventually, agreed.</p>` },

  end_blockade_hardline: { conclusion: true, title: 'October 29, 1962 — The Bluff Called',
    epilogue: `<p>Khrushchev's reaction to the rejection was not what anyone expected. He didn't escalate. He didn't respond through the back-channel. He went silent for 72 hours. Soviet ships sat dead in the water, neither advancing nor retreating. Construction in Cuba continued.</p><p>On October 29th, a U-2 was shot down over Cuba. The pilot, Major Rudolf Anderson, was killed. The Joint Chiefs demanded immediate retaliation. Kennedy refused, but he was running out of room. The blockade had worked tactically — no new weapons were getting through — but strategically, 42 missiles were still in Cuba and getting closer to operational every hour.</p><p>The crisis ended not with a deal but with a slow, grinding standoff that lasted until Christmas. The missiles eventually came out — but only after Khrushchev extracted the Turkey removal, a no-invasion pledge, AND American agreement to close two intelligence-gathering stations in Pakistan. Hardline tactics had bought leverage but spent it all on a drawn-out negotiation that cost more than the original deal would have.</p>` },

  end_scramble: { conclusion: true, title: 'October 27, 1962 — The Reversal',
    epilogue: `<p>The quarantine line snapped back to 500 miles at midnight. The USS Essex moved to intercept the Kimovsk at flank speed. But Khrushchev had used the pullback window masterfully — the Kimovsk was now only 60 miles from Havana, escorted by a Soviet submarine. Stopping it meant a confrontation at close range, with a submarine in the water and Cuban MiG fighters overhead.</p><p>The interception happened at dawn on October 27th. The Kimovsk stopped when the Essex fired warning shots. The submarine surfaced — it was B-59, running on its last battery reserves. Both crews stared at each other across 200 yards of Caribbean water. Nobody fired.</p><p>The boarding found the guidance systems. They were confiscated. But the delay had cost critical days. Two missile sites reached operational status before the crisis resolved in early November. The pullback became the most studied decision of the crisis — a cautionary tale about how hesitation, even well-intentioned, can create the very dangers it seeks to avoid.</p>` },

  end_late_strikes: { conclusion: true, title: 'October 28, 1962 — When Diplomacy Ran Out',
    epilogue: `<p>The strikes launched at 0500 on October 28th — six days later than the Joint Chiefs had originally wanted, with six fewer days of margin. The delay meant the sites were closer to operational. The strikes had to be more extensive, more destructive. Soviet casualties were higher. The element of surprise was gone — Khrushchev had hardened his positions and dispersed his forces.</p><p>The military damage was done. The missiles were destroyed. But the diplomatic cost was catastrophic. Kennedy had tried diplomacy, tried restraint, tried a pullback — and then struck anyway. To the world, it looked like a man who had exhausted his peaceful options and resorted to violence out of desperation rather than strength. To Moscow, it looked like proof that America could never be trusted to negotiate in good faith.</p><p>The missiles were gone. So was any chance of arms control for a decade. The Cold War's most dangerous chapter ended with the worst possible lesson: that talking was just what you did while you waited for the bombs to be ready.</p>` },

  end_fait_accompli: { conclusion: true, title: 'January 1963 — Living With the Bomb',
    epilogue: `<p>The Soviet missiles in Cuba became operational on November 1, 1962. For the first time since Hiroshima, nuclear weapons were aimed at American cities from 90 miles away — and there was nothing to be done about it short of starting the war everyone was trying to prevent.</p><p>Kennedy addressed the nation on November 5th. "We must now live in a world where the balance of power has shifted," he said. "But the balance of terror remains. Soviet missiles in Cuba do not change the fundamental reality: any nuclear attack on the United States will be met with total and devastating retaliation." It was a policy of acceptance wrapped in a threat. Deterrence, not victory.</p><p>The missiles stayed for four months. They were eventually traded away in February 1963 for a comprehensive deal: no invasion, Turkey removal, and a mutual pledge to never again station nuclear weapons in the Western Hemisphere. The crisis was over. But for 120 days, America had lived with Soviet nuclear missiles aimed at its cities from 90 miles away — and the psychological impact of that experience reshaped American politics, defense policy, and national identity for a generation.</p>` },

  end_dual_track_win: { conclusion: true, title: 'October 28, 1962 — The Two-Track Solution',
    epilogue: `<p>The dual-track approach — public firmness and private flexibility — produced its result on the morning of October 28th. The quarantine line held. The back-channel delivered. Khrushchev, given a face-saving exit through the private Turkey assurance, announced on Radio Moscow that the missiles would be withdrawn.</p><p>It was the best possible outcome: no shots fired, no concessions made public, no allies betrayed. The secret deal on Turkey wouldn't surface for decades. Both leaders could claim they had stood firm and won.</p><p>The real victory, though, belonged to the idea that strength and diplomacy weren't opposites — that you could hold a gun and extend a hand at the same time, and that the willingness to do both simultaneously was the only thing standing between October 1962 and the end of the world.</p>` },

  end_diplo_gamble: { conclusion: true, title: 'November 1962 — The Gambler\'s Reward',
    epilogue: `<p>Easing enforcement to protect the back-channel was a gamble — and it almost didn't pay off. Two additional Soviet cargo ships reached Cuba during the relaxed enforcement period. Congressional leaders leaked the information, and Kennedy faced a firestorm of criticism. For 48 hours, it looked like the President had been played.</p><p>Then Dobrynin delivered. Khrushchev, working through the channel Kennedy had kept alive at such political cost, agreed to full withdrawal. The deal was simpler than anyone expected: no-invasion pledge, quiet Turkey removal, and — Khrushchev's only demand — that the agreement be kept entirely secret. No public statements. No press conferences. Both sides simply acted as if the missiles had never been there.</p><p>It was the most elegant and least satisfying resolution imaginable. Kennedy's critics never knew what he had achieved or how. The diplomat's gamble paid off, but the diplomat got no credit.</p>` },

  end_diplo_deadline: { conclusion: true, title: 'October 26, 1962 — The 72-Hour Clock',
    epilogue: `<p>Dobrynin blanched when Bobby Kennedy laid out the deadline. "Seventy-two hours is not enough time to—" Bobby cut him off: "It's what we have. After that, my brother's options narrow to one, and neither of us wants to see what that looks like."</p><p>For three days, Moscow worked at a pace that terrified everyone involved. Khrushchev convened four Presidium sessions. Orders flew to Cuba. Construction sites went dark — not because the workers had been told to stop, but because Moscow had recalled the senior engineers. On the 71st hour, Dobrynin called Bobby: "We are prepared to begin dismantlement. We require your pledge and the Turkey arrangement."</p><p>The deadline had worked — but just barely. Kennedy told his inner circle afterward: "Never set a deadline you're not prepared to enforce. We were. That's why it worked." He paused, then added: "And if it hadn't worked, we would be having a very different conversation right now."</p>` },

  end_equivalence_deal: { conclusion: true, title: 'October 24, 1962 — The Words That Changed Everything',
    epilogue: `<p>Kennedy's statement was carefully worded but unmistakable: "The United States acknowledges that the presence of missiles near another nation's borders is a source of legitimate concern — regardless of which nation those missiles belong to." It stopped short of the word "equivalent." Moscow accepted it as close enough.</p><p>NATO allies were apoplectic. De Gaulle withdrew France from NATO's military command structure — a break that, in another timeline, wouldn't happen until 1966. Turkey's government fell within months. The Western alliance cracked in ways that took a decade to repair.</p><p>But the missiles left Cuba. They left Turkey. And the crisis that might have ended civilization ended instead with a sentence — a carefully chosen, deliberately ambiguous sentence that gave both sides just enough to claim they had not lost. It was, perhaps, the most consequential paragraph in the history of the English language.</p>` },

  end_wordsmith_deal: { conclusion: true, title: 'October 25, 1962 — The Art of Saying Almost Nothing',
    epilogue: `<p>"Both nations have legitimate security concerns that can and must be addressed through negotiation rather than confrontation." That was the sentence. Fourteen words that took four days to draft, three shouting matches between Kennedy and his speechwriters, and a final 2 AM call to Dobrynin to confirm that Moscow could live with it.</p><p>Khrushchev could tell the Presidium that America had admitted its missiles were a provocation. Kennedy could tell Congress he had made no concession. Both were right. Both were wrong. The missiles came out on both sides. No one claimed victory.</p><p>It was the purest expression of what diplomacy actually is: the art of giving everyone just enough of what they need while giving no one exactly what they want. The world survived because two men agreed to be imprecise.</p>` },

  end_diplo_collapse: { conclusion: true, title: 'October 24, 1962 — The Door That Closed',
    epilogue: `<p>Kennedy's address revealed the missiles, imposed the quarantine, and made no mention of the back-channel negotiations that had been underway for a week. Dobrynin watched the speech on television at the Soviet Embassy. He called Bobby Kennedy at 11 PM: "You have destroyed the possibility of a quiet resolution. I hope you understand what that means."</p><p>The quarantine went into effect. Soviet ships approached the line. For five days, the crisis played out through public confrontation rather than private negotiation — louder, more dangerous, with less room to maneuver. When Khrushchev's letters finally arrived on October 26th and 27th, the terms were harder than what he had been willing to accept a week earlier. The diplomatic path had raised the price of peace.</p><p>The crisis eventually resolved along the same lines the back-channel had been approaching — no invasion, Turkey missiles removed, missiles withdrawn. But it took an extra week, cost an extra U-2 pilot's life, and brought the world several days closer to the edge than it needed to go. The lesson was painful: a diplomatic opening, once closed, cannot simply be reopened at the same price.</p>` },

  end_un_standdown: { conclusion: true, title: 'November 1962 — The Inspector\'s Report',
    epilogue: `<p>U Thant's two-week standdown, conditioned on a construction freeze, produced the strangest fortnight of the Cold War. UN inspectors — hastily assembled from neutral nations — arrived in Cuba to verify the freeze. Castro, furious at the intrusion, confined them to a single hotel in Havana and allowed them to visit exactly two of the twenty-three known missile sites.</p><p>CIA reconnaissance filled in the gaps. Construction had slowed but not stopped. At least two sites appeared to be nearing operational status despite the supposed freeze. Kennedy, armed with the evidence, went back to the UN and exposed the violation. Khrushchev, facing public humiliation for a second time, made the calculation that the missiles were costing more than they were worth.</p><p>The withdrawal began on November 8th. It was not the clean resolution anyone had hoped for, but it was a resolution — achieved without a shot fired, under the eyes of the international community. The UN, for one brief moment, had actually worked as intended.</p>` },

  end_un_then_blockade: { conclusion: true, title: 'October 28, 1962 — Legitimacy and Power',
    epilogue: `<p>The sequence — first the UN exposure, then the quarantine — proved devastating. Khrushchev found himself blockaded by a nation with the moral authority of having gone to the international community first. Every Soviet protest about the quarantine was met with the same response: "We showed you the evidence in open session. You lied. The quarantine is the consequence."</p><p>World opinion, which might have been divided by an American blockade alone, consolidated behind the U.S. position. Even nations sympathetic to the Soviet Union couldn't defend the lies. The quarantine held without serious challenge — no Soviet captain wanted to be the one to defy a blockade that the whole world was watching.</p><p>Khrushchev, boxed in diplomatically and militarily, offered withdrawal terms within six days. The resolution came faster than anyone expected, because the combination of legitimacy and force left Moscow with no good options and no sympathetic audience. It was the template for how crises would be managed for the next thirty years — though it would rarely work as cleanly again.</p>` },

  end_un_resolution: { conclusion: true, title: 'November 1962 — The Vote That Never Came',
    epilogue: `<p>The push for a formal Security Council resolution demanding missile withdrawal ran headlong into the reality of the Soviet veto. Moscow blocked the resolution on October 25th. Kennedy, who had staked his strategy on the UN process, found himself with international sympathy but no enforceable mechanism.</p><p>The General Assembly passed a non-binding resolution by a vote of 94-11, demanding withdrawal. It was the most lopsided Cold War vote in UN history. Khrushchev dismissed it as "a piece of paper with no army behind it." He was technically right. But the overwhelming vote shifted something in the Kremlin calculus. Being that isolated, that publicly condemned, carried a cost that couldn't be measured in missiles.</p><p>The quarantine was implemented on October 28th — late, but with near-universal international support. The combination of public humiliation and naval pressure produced withdrawal terms by mid-November. The crisis lasted two weeks longer than it might have, but ended with the Soviet Union more isolated and the UN more relevant than either had been before. Whether that trade was worth the extra fourteen days of nuclear danger remained a question that historians would debate for decades.</p>` }
};

/* ==========================================================
   ALTERNATIVE HISTORY MODE — Render & Navigation
   ========================================================== */
function renderAltAdventure() {
  const node = ALT_TREE[state.altNode];
  if (!node) { state.screen = 'intro'; render(); return; }

  // Round progress indicator
  const totalRounds = 3;
  const round = state.altRound;
  let progressDots = '';
  for (let i = 1; i <= totalRounds + 1; i++) {
    if (i <= round) progressDots += `<span style="color:var(--amber-lit);">&#9679;</span> `;
    else progressDots += `<span style="color:var(--border);">&#9675;</span> `;
  }

  // ── CONCLUSION / ENDING NODE ──
  if (node.conclusion) {
    setRoot(`
      <div style="max-width:800px; margin:0 auto; padding:30px 20px;">
        <div style="text-align:center; margin-bottom:24px;">
          <div style="font-family:'Courier New',monospace; font-size:11px; color:var(--red); letter-spacing:3px;">&#9888; ALTERNATIVE TIMELINE — CONCLUSION</div>
          <div style="font-size:12px; color:var(--amber); margin-top:6px;">${progressDots}</div>
        </div>
        <div class="doc" style="border-color:var(--red); background:#1a0a0a;">
          <div class="doc-head" style="color:var(--red);">${esc(node.title)}</div>
          <div id="alt-epilogue" style="color:var(--amber-lit); line-height:1.8; font-size:15px;">
            ${node.epilogue}
          </div>
        </div>
        ${listenBtn('alt-epilogue')}
        <div style="text-align:center; margin-top:30px;">
          <button class="start-btn" style="background:#1a1200; border-color:var(--amber); color:var(--amber-lit);" onclick="state.screen='intro'; render();">&#8592; &nbsp; RETURN TO MAIN MENU</button>
          <button class="start-btn" style="background:#0a0a1a; border-color:var(--red); color:var(--red); margin-left:12px;" onclick="startAltSim();">&#9889; &nbsp; TRY A DIFFERENT PATH</button>
        </div>
      </div>
    `);
    return;
  }

  // ── CHOICE NODE ──
  const narrativeHTML = node.narrative
    ? `<div class="doc" style="border-color:#555;">
         <div class="doc-head" style="color:var(--amber-lit);">${esc(node.setting)}</div>
         <div id="alt-narrative" style="color:var(--amber-lit); line-height:1.8; font-size:15px;">
           <p>${node.narrative}</p>
         </div>
       </div>
       ${listenBtn('alt-narrative')}`
    : '';

  const choicesHTML = node.choices.map(c => `
    <button class="option-btn" onclick="makeAltChoice('${c.next}')" style="text-align:left; margin-bottom:10px;">
      <span style="color:var(--amber-lit); font-weight:bold;">${esc(c.label)}</span><br>
      <span style="font-size:13px; color:#bbb; font-weight:normal;">${esc(c.summary)}</span>
    </button>
  `).join('');

  setRoot(`
    <div style="max-width:800px; margin:0 auto; padding:30px 20px;">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-family:'Courier New',monospace; font-size:11px; color:var(--red); letter-spacing:3px;">&#9888; ALTERNATIVE TIMELINE — ROUND ${round}</div>
        <div style="font-size:12px; color:var(--amber); margin-top:6px;">${progressDots}</div>
      </div>
      ${narrativeHTML}
      <div class="doc" style="border-color:var(--amber); margin-top:20px;">
        <div class="doc-head" style="color:var(--amber);">&#9762; DECISION POINT</div>
        <div id="alt-prompt" style="color:var(--amber-lit); line-height:1.8; font-size:15px; margin-bottom:16px;">
          <p>${node.prompt}</p>
        </div>
        ${listenBtn('alt-prompt')}
        <div style="margin-top:16px;">
          ${choicesHTML}
        </div>
      </div>
    </div>
  `);
}

function makeAltChoice(nextNodeId) {
  state.altPath.push(state.altNode);
  state.altNode = nextNodeId;
  state.altRound++;
  persistState();
  render();
}

let _pendingChoice = null; // { phase, choice }

function makeChoice(phase, choice) {
  _pendingChoice = { phase, choice };
  state.choices[phase] = choice;
  state.choiceLabels[phase] = LABEL_MAP[phase][choice];
  persistState();

  // Show explanation modal
  const label = LABEL_MAP[phase][choice];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'explanation-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-label">DECISION RECORDED — PHASE ${phase}</div>
      <div class="modal-title">Explain Your Reasoning</div>
      <div class="modal-choice">Your recommendation: <strong>${esc(label)}</strong></div>
      <div class="modal-prompt">In 2–3 sentences, explain <em>why</em> you chose this option. What factors from the documents influenced your decision?</div>
      <div id="modal-err" class="modal-err"></div>
      <textarea class="modal-textarea" id="modal-explanation" placeholder="I chose this because..."></textarea>
      <button class="modal-submit" onclick="submitExplanation()">▶ &nbsp; SUBMIT &amp; SEE WHAT ACTUALLY HAPPENED</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('modal-explanation').focus();
}

function submitExplanation() {
  const text = document.getElementById('modal-explanation').value.trim();
  if (text.length < 15) {
    document.getElementById('modal-err').textContent = '⚠ Please write at least a couple sentences explaining your reasoning.';
    return;
  }

  const phase = _pendingChoice.phase;
  state.explanations[phase] = text;

  // Remove modal
  const modal = document.getElementById('explanation-modal');
  if (modal) modal.remove();

  // Go to transition screen
  const nextScreens = { 1: 'phase2', 2: 'phase3', 3: 'phase4', 4: 'resolution' };
  state.transition = { phase: phase, nextScreen: nextScreens[phase] };
  state.screen = 'transition';
  _pendingChoice = null;
  render();
}

/* ==========================================================
   TRANSITION SCREEN — "WHAT ACTUALLY HAPPENED"
   ========================================================== */
function renderTransitionScreen() {
  const tr = state.transition;
  const phase = tr.phase;
  renderTimeline(phase);

  const hist = HISTORICAL[phase];
  const wh = WHAT_HAPPENED[phase];
  const yourChoice = state.choices[phase];
  const yourLabel = state.choiceLabels[phase];
  const matched = (yourChoice === hist.choice);

  let comparisonBox;
  if (matched) {
    comparisonBox = `
      <div style="max-width:740px; margin:28px auto 0; padding:16px 20px; background:#0a1e0a; border:1px solid var(--green-mid); border-radius:3px; text-align:left;">
        <div style="font-family:'Courier New',monospace; font-size:11px; color:var(--green-mid); letter-spacing:2px; margin-bottom:8px;">&#10003; YOUR RECOMMENDATION MATCHED HISTORY</div>
        <div style="font-size:14px; color:var(--green-lit); line-height:1.7;">You recommended <strong>${esc(yourLabel)}</strong> — the same decision Kennedy made.</div>
      </div>`;
  } else {
    comparisonBox = `
      <div style="max-width:740px; margin:28px auto 0; padding:16px 20px; background:#1a1200; border:1px solid var(--amber); border-radius:3px; text-align:left;">
        <div style="font-family:'Courier New',monospace; font-size:11px; color:var(--amber); letter-spacing:2px; margin-bottom:8px;">&#9888; YOUR RECOMMENDATION DIVERGED FROM HISTORY</div>
        <div style="font-size:14px; color:var(--amber-lit); line-height:1.7; margin-bottom:6px;">You recommended: <strong>${esc(yourLabel)}</strong></div>
        <div style="font-size:14px; color:#7ab07a; line-height:1.7;">Kennedy chose: <strong>${esc(hist.label)}</strong></div>
      </div>`;
  }

  setRoot(`
    <div style="max-width:740px; margin:0 auto; padding:30px 0 60px;">
      <div class="ph-meta">WHAT ACTUALLY HAPPENED — PHASE ${phase}</div>
      <div class="ph-title">${wh.title}</div>
      <div class="doc">
        <div class="doc-body" id="wh-text" style="font-size:15px; line-height:1.9;">
          <p>${wh.text}</p>
        </div>
      </div>
      ${listenBtn('wh-text')}
      ${comparisonBox}
      <div style="text-align:center; margin-top:36px;">
        <button class="continue-btn" onclick="advanceFromTransition()">▶ &nbsp; CONTINUE TO NEXT BRIEFING</button>
      </div>
    </div>
  `);
}

function advanceFromTransition() {
  state.screen = state.transition.nextScreen;
  state.transition = null;
  render();
}

/* ==========================================================
   RESOLUTION — OCT 28
   ========================================================== */
function renderResolution() {
  renderTimeline(5);

  // Build choice comparison table
  const phases = [
    { num: 1, title: 'The Discovery' },
    { num: 2, title: 'The Debate' },
    { num: 3, title: 'The Quarantine' },
    { num: 4, title: 'Black Saturday' }
  ];
  const comparisonRows = phases.map(p => {
    const yours = state.choiceLabels[p.num] || 'N/A';
    const hist = HISTORICAL[p.num];
    const matched = state.choices[p.num] === hist.choice;
    const icon = matched ? '<span style="color:var(--green-mid);">&#10003;</span>' : '<span style="color:var(--amber);">&#9888;</span>';
    return `<div class="choice-row">
      <span class="phase-tag">${icon} PH ${p.num}:</span>
      <span>You: <strong>${esc(yours)}</strong> &nbsp;|&nbsp; Kennedy: <strong>${esc(hist.label)}</strong></span>
    </div>`;
  }).join('');

  setRoot(`
    <div class="ph-meta">SUNDAY, OCTOBER 28, 1962 &nbsp;—&nbsp; CRISIS RESOLUTION</div>
    <div class="ph-title">The Outcome: How the Crisis Ended</div>

    <div class="doc">
      <div class="doc-body" id="resolution-text" style="font-size:15px; line-height:1.9;">
        <p>On the morning of October 28th, Khrushchev's message came through Radio Moscow: the Soviet Union would dismantle and return its missiles from Cuba. The thirteen days were over.</p>
        <p>The deal: the United States pledged not to invade Cuba. The Soviet missiles were withdrawn under UN inspection by November 1962. Secretly — and this would not become public for decades — the U.S. agreed to remove its Jupiter missiles from Turkey within six months. They were quietly dismantled in April 1963.</p>
        <p>The crisis produced lasting consequences. A direct "hotline" was installed between Washington and Moscow so that future leaders would never have to communicate through slow diplomatic cables in moments when minutes counted. Within a year, the United States, Soviet Union, and United Kingdom signed the Partial Nuclear Test Ban Treaty — the first major arms control agreement of the Cold War.</p>
        <p><strong>What you did not know — and neither did EXCOMM:</strong></p>
        <p>Remember submarine B-59, the Foxtrot-class boat you saw in the Phase 3 intelligence photos? Here is what was happening inside it.</p>
        <p>After being depth-charged for hours with no radio contact from Moscow, the submarine's commander — Captain Valentin Savitsky — became convinced that nuclear war had already begun on the surface. He ordered B-59's nuclear torpedo armed and prepared for launch against the American destroyers above. The torpedo carried a warhead equivalent to the Hiroshima bomb.</p>
        <p>Soviet naval regulations required the unanimous agreement of three senior officers to authorize a nuclear launch. Two agreed. The third — Fleet Commodore Vasili Arkhipov — refused. He argued they should surface and await orders from Moscow. He was shouted at, accused of cowardice. He still refused.</p>
        <p><strong>One man's refusal, in the dark, under attack, believing the world was already at war — is the reason civilization continued.</strong> No one in the White House, the Pentagon, or the Kremlin knew this had happened. The story did not become public until Russian archives were opened in 2002, forty years later.</p>
      </div>
    </div>
    ${listenBtn('resolution-text')}

    <div class="compare-box">
      <h3>YOUR DECISIONS vs. KENNEDY'S DECISIONS</h3>
      <div class="choices-summary">${comparisonRows}</div>
    </div>

    <div style="text-align:center; margin-top:36px;">
      <button class="continue-btn" onclick="goToRationale()">▶ &nbsp; WRITE YOUR FINAL ANALYSIS</button>
    </div>
  `);
}

function goToRationale() {
  state.screen = 'rationale';
  render();
}

/* ==========================================================
   RATIONALE INPUT
   ========================================================== */
function renderRationale() {
  renderTimeline(5);
  setRoot(`
    <div class="ph-meta">FINAL REPORT — ${esc(state.name)}</div>
    <div class="ph-title">Your Final Analysis</div>

    <!-- QUESTION 1: REFLECTION -->
    <div class="rationale-prompts">
      <h3>QUESTION 1 — REFLECTION ON YOUR CHOICES</h3>
      <p style="font-size:14px; color:#7ab07a; line-height:1.8; margin-top:8px;">Look back at the four decisions you made during the simulation. Which decision was the hardest for you, and why? If any of your choices were different from what Kennedy actually did, explain whether — after seeing what really happened — you would change your recommendation or stick with it.</p>
    </div>

    <textarea
      class="rationale-textarea"
      id="rationale-text"
      placeholder="The hardest decision for me was..."
      oninput="handleRationaleInput(this.value)"
      style="min-height:200px;"
    >${esc(state.rationale)}</textarea>

    <!-- QUESTION 2: COMPREHENSION CHECK -->
    <div class="rationale-prompts" style="margin-top:8px;">
      <h3>QUESTION 2 — CHECK FOR UNDERSTANDING</h3>
      <p style="font-size:14px; color:#7ab07a; line-height:1.8; margin-top:8px;">The Cuban Missile Crisis was resolved without nuclear war. Based on what you read in this simulation, identify <strong>two specific reasons</strong> why. One should involve a decision made by a leader (Kennedy, Khrushchev, or someone else), and one should involve something that was <em>not</em> planned or controlled by any leader.</p>
    </div>

    <textarea
      class="rationale-textarea"
      id="comprehension-text"
      placeholder="Two reasons the crisis was resolved without nuclear war..."
      oninput="handleComprehensionInput(this.value)"
      style="min-height:200px;"
    >${esc(state.comprehension)}</textarea>

    <div id="rationale-err" class="error-msg" style="margin-bottom:12px;"></div>
    <button class="submit-btn" onclick="submitRationale()">▶ &nbsp; SUBMIT &amp; GENERATE REPORT</button>
  `);
}

function submitRationale() {
  const r = document.getElementById('rationale-text').value.trim();
  const c = document.getElementById('comprehension-text').value.trim();
  if (r.length < 30) {
    document.getElementById('rationale-err').textContent = '⚠ Please write a more complete answer to Question 1 (at least a few sentences).';
    return;
  }
  if (c.length < 30) {
    document.getElementById('rationale-err').textContent = '⚠ Please write a more complete answer to Question 2 (at least a few sentences).';
    return;
  }
  state.rationale = r;
  state.comprehension = c;
  state.screen = 'complete';
  render();
}

function handleRationaleInput(value) {
  state.rationale = value;
  persistState();
}

function handleComprehensionInput(value) {
  state.comprehension = value;
  persistState();
}

/* ==========================================================
   COMPLETE SCREEN
   ========================================================== */
function renderComplete() {
  renderTimeline(5);

  // In historical mode, mark as completed to unlock alt-history
  if (state.mode === 'historical') markCompleted();

  const pdfReady = isPdfReady();
  const pdfErrored = Boolean(window.__jsPdfLoadError);
  const exportAttrs = (!pdfReady || pdfErrored) ? 'disabled aria-disabled=\"true\"' : '';
  let pdfStatus = '';
  if (pdfErrored) {
    pdfStatus = '<p class=\"pdf-error\">PDF generator failed to load. Check your connection and reload the page to try again.</p>';
  } else if (!pdfReady) {
    pdfStatus = '<p class=\"pdf-warn\">PDF generator is still loading. Once it finishes, the download button will unlock automatically.</p>';
  }
  setRoot(`
    <div class="complete-screen">
      <div class="intro-eyebrow">SIMULATION COMPLETE</div>
      <div class="intro-title" style="margin-bottom:10px;">Advisory Report Ready</div>
      <div class="intro-sub" style="margin-bottom:30px;">EXCOMM — OCTOBER 1962</div>
      <div class="intro-body" style="text-align:center;">
        <p>Your advisory record has been logged. Click below to download a PDF report of your choices, the simulation outcome, and your written analysis.</p>
        <p style="color:var(--amber);">Save this file and submit it to your teacher as directed.</p>
        <p style="color:var(--green-mid); font-style:italic; margin-top:12px;">&#9889; Alternative History mode has been unlocked. Return to the start screen to try it.</p>
      </div>
      <button class="export-btn" onclick="exportPDF()" ${exportAttrs}>⬇ &nbsp; DOWNLOAD PDF REPORT</button>
      ${pdfStatus}
      <br><br>
      <button class="continue-btn" style="margin-top:10px;" onclick="resetSim()">↺ &nbsp; RESTART SIMULATION</button>
    </div>
  `);
}

function resetSim() {
  Object.assign(state, {
    name: '', screen: 'intro', mode: 'historical', choices: {}, choiceLabels: {},
    explanations: {}, transition: null, rationale: '', comprehension: '',
    altNode: 'root', altRound: 1, altPath: []
  });
  clearPersistedState();
  render();
}

/* ==========================================================
   PDF EXPORT
   ========================================================== */
function exportPDF() {
  if (!isPdfReady()) {
    const msg = window.__jsPdfLoadError
      ? 'The PDF generator could not be loaded. Please check your internet connection and reload the page.'
      : 'The PDF generator is still loading. Please wait a moment and try again.';
    alert(msg);
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  const PW = 612, PH = 792;
  const ML = 60, MR = 60, MT = 60;
  const TW = PW - ML - MR;
  let y = MT;

  const LINE = (x1, y1, x2, y2, r, g, b) => {
    doc.setDrawColor(r, g, b);
    doc.line(x1, y1, x2, y2);
  };

  const TEXT = (text, x, yPos, size, r, g, b, style = 'normal', align = 'left') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    doc.text(text, x, yPos, { align });
  };

  const BLOCK = (text, x, yPos, maxW, size, r, g, b, style = 'normal') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    const lines = doc.splitTextToSize(text, maxW);
    doc.text(lines, x, yPos);
    return lines.length * (size * 1.35);
  };

  function checkPage(needed = 40) {
    if (y + needed > PH - 50) {
      doc.addPage();
      y = MT;
    }
  }

  const startAnalysisPage = (isContinuation = false) => {
    doc.addPage();
    doc.setFillColor(139, 0, 0);
    doc.rect(0, 0, PW, 28, 'F');
    TEXT('TOP SECRET — EYES ONLY', PW / 2, 18, 8, 255, 255, 255, 'bold', 'center');

    y = 65;
    const heading = isContinuation ? 'SECTION II — STUDENT ANALYSIS (CONT.)' : 'SECTION II — STUDENT ANALYSIS';
    TEXT(heading, ML, y, 14, 30, 60, 30, 'bold');
    y += 6;
    LINE(ML, y, PW - MR, y, 150, 130, 90);
    y += 18;

    if (!isContinuation) {
      TEXT(`Advisor: ${state.name}`, ML, y, 11, 80, 60, 0);
      y += 26;
    }
  };

  // ── PAGE 1: COVER ────────────────────────────────────────
  // Red top banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, 0, PW, 28, 'F');
  TEXT('TOP SECRET — EYES ONLY — EXECUTIVE COMMITTEE OF THE NATIONAL SECURITY COUNCIL',
    PW / 2, 18, 7.5, 255, 255, 255, 'bold', 'center');

  y = 70;
  LINE(ML, y, PW - MR, y, 60, 30, 0);
  y += 16;
  TEXT('ADVISORY SIMULATION REPORT', PW / 2, y, 11, 100, 70, 0, 'normal', 'center');
  y += 8;
  LINE(ML, y, PW - MR, y, 60, 30, 0);

  y += 50;
  TEXT('CUBAN MISSILE CRISIS', PW / 2, y, 28, 30, 60, 30, 'bold', 'center');
  y += 32;
  TEXT('EXCOMM Advisory Simulation', PW / 2, y, 16, 60, 100, 60, 'italic', 'center');
  y += 14;
  TEXT('October 16 – 28, 1962', PW / 2, y, 13, 80, 60, 0, 'normal', 'center');

  y += 50;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  y += 24;
  TEXT('STUDENT ADVISOR:', ML, y, 11, 80, 60, 0, 'bold');
  y += 17;
  TEXT(state.name, ML + 20, y, 15, 20, 20, 20, 'bold');

  y += 24;
  TEXT('SIMULATION DATE:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), ML + 20, y, 12, 40, 40, 40);

  // Count how many matched history
  const matchCount = [1,2,3,4].filter(p => state.choices[p] === HISTORICAL[p].choice).length;
  y += 24;
  TEXT('HISTORICAL ALIGNMENT:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(`${matchCount} of 4 decisions matched Kennedy's actual choices`, ML + 20, y, 12, 40, 40, 40);

  y += 45;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  // ── ADVISORY RECORD ──
  y += 28;
  TEXT('SECTION I — ADVISORY RECORD', ML, y, 14, 30, 60, 30, 'bold');
  y += 6;
  LINE(ML, y, PW - MR, y, 150, 130, 90);
  y += 18;

  const phaseData = [
    { num: 1, date: 'Oct 16', label: 'Initial Response to Discovery' },
    { num: 2, date: 'Oct 17–19', label: 'Kennedy\'s Public Address' },
    { num: 3, date: 'Oct 22–25', label: 'Soviet Ships at Quarantine Line' },
    { num: 4, date: 'Oct 27', label: 'Black Saturday Response' }
  ];

  phaseData.forEach(ph => {
    checkPage(90);
    TEXT(`PHASE ${ph.num} — ${ph.date}`, ML, y, 10, 139, 0, 0, 'bold');
    y += 13;
    TEXT(`Decision Point: ${ph.label}`, ML + 10, y, 10, 60, 50, 0);
    y += 13;
    const choice = state.choiceLabels[ph.num] || 'N/A';
    const hist = HISTORICAL[ph.num];
    const matched = state.choices[ph.num] === hist.choice;
    TEXT(`Your Recommendation: ${choice}`, ML + 10, y, 11, 20, 20, 20, 'bold');
    y += 13;
    TEXT(`Kennedy's Decision: ${hist.label}${matched ? ' ✓ MATCH' : ''}`, ML + 10, y, 10, 80, 60, 0);
    y += 14;
    // Student explanation
    const explanation = state.explanations[ph.num];
    if (explanation) {
      const eh = BLOCK(`Student reasoning: "${explanation}"`, ML + 10, y, TW - 10, 10, 60, 60, 60, 'italic');
      y += eh + 6;
    }
    LINE(ML, y, PW - MR, y, 200, 190, 170);
    y += 14;
  });

  // ── PAGE 2: STUDENT ANALYSIS ────────────────────────────
  startAnalysisPage(false);

  const lineHeight = 12 * 1.35;

  function writeBlock(label, text) {
    checkPage(60);
    TEXT(label, ML, y, 11, 139, 0, 0, 'bold');
    y += 16;
    const clean = (text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim() || 'No response submitted.';
    const lines = doc.splitTextToSize(clean, TW);
    doc.setFontSize(12);
    doc.setTextColor(20, 20, 20);
    doc.setFont('times', 'normal');
    lines.forEach(line => {
      if (y + lineHeight > PH - 60) {
        startAnalysisPage(true);
        doc.setFontSize(12);
        doc.setTextColor(20, 20, 20);
        doc.setFont('times', 'normal');
      }
      doc.text(line, ML, y);
      y += lineHeight;
    });
    y += 16;
  }

  writeBlock('QUESTION 1 — REFLECTION ON YOUR CHOICES', state.rationale);
  writeBlock('QUESTION 2 — CHECK FOR UNDERSTANDING', state.comprehension);

  y += 14;

  // Footer on last page
  checkPage(60);
  LINE(ML, y, PW - MR, y, 180, 160, 120);
  y += 16;
  TEXT('Cuban Missile Crisis EXCOMM Simulation — Educational Use Only', PW / 2, y, 9, 120, 100, 60, 'italic', 'center');
  y += 13;
  TEXT(`Based on declassified historical records. Completed: ${new Date().toLocaleString()}`, PW / 2, y, 9, 120, 100, 60, 'italic', 'center');

  // Red bottom banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, PH - 24, PW, 24, 'F');
  TEXT('TOP SECRET — EYES ONLY', PW / 2, PH - 9, 8, 255, 255, 255, 'bold', 'center');

  // Save
  const fname = `EXCOMM_Report_${state.name.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
  doc.save(fname);
}

/* ==========================================================
   INIT
   ========================================================== */
loadPersistedState();
render();
window.addEventListener('load', () => {
  if (state.screen === 'complete' && isPdfReady()) {
    render();
  }
});
</script>
</body>
</html>
