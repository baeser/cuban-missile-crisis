<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXCOMM Briefing System — Cuban Missile Crisis 1962</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" id="jspdf-lib" onerror="window.__jsPdfLoadError = true;"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:       #080d08;
      --panel:      #0f1a0f;
      --panel2:     #141f14;
      --border:     #1e3a1e;
      --green-dim:  #3a6a3a;
      --green-mid:  #5a9a5a;
      --green-lit:  #a8d4a8;
      --green-bright:#d4f4d4;
      --amber:      #d4900a;
      --amber-lit:  #f0b030;
      --red:        #c0392b;
      --red-dark:   #8b0000;
      --doc-bg:     #f0e9d8;
      --doc-border: #8b7050;
      --doc-head:   #e4dcc8;
      --doc-text:   #1a1208;
    }

    body {
      background: var(--dark);
      color: var(--green-lit);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── CHROME ──────────────────────────────── */
    .cls-banner {
      background: var(--red-dark);
      color: #fff;
      text-align: center;
      padding: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      font-weight: bold;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hdr-left {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-mid);
      letter-spacing: 2px;
    }

    .hdr-right {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 1px;
    }

    .timeline-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
    }

    .tl-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      margin-right: 6px;
      white-space: nowrap;
    }

    .tl-day {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      white-space: nowrap;
    }

    .tl-day.done  { background: #0a1e0a; color: var(--green-dim); border-color: #1e3a1e; cursor: pointer; }
    .tl-day.done:hover { background: #142814; color: var(--green-lit); border-color: var(--green-mid); }
    .tl-day.now   { background: #1a3a1a; color: var(--green-lit); border-color: var(--green-mid); font-weight: bold; cursor: pointer; }
    .tl-day.now:hover { background: #244a24; }
    .tl-day.future{ opacity: 0.35; }

    .tl-restart {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--red);
      padding: 2px 8px;
      border: 1px solid var(--red-dark);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      margin-left: auto;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .tl-restart:hover { background: rgba(192,57,43,0.15); color: #e06050; border-color: var(--red); }

    /* ── LAYOUT ──────────────────────────────── */
    .main {
      max-width: 860px;
      margin: 30px auto;
      padding: 0 20px 60px;
    }

    /* ── PHASE HEADER ────────────────────────── */
    .ph-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .ph-title {
      font-size: 28px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 12px;
    }

    .ph-context {
      font-size: 15px;
      color: #7ab07a;
      font-style: italic;
      border-left: 3px solid var(--green-dim);
      padding-left: 16px;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    /* ── DOCUMENTS ───────────────────────────── */
    .doc {
      background: var(--doc-bg);
      color: var(--doc-text);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    .doc-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .doc-cls {
      color: var(--red);
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }

    .doc-meta { color: #3a2800; line-height: 1.7; }
    .doc-meta span { display: block; }

    .doc-body {
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.85;
    }

    .doc-body p   { margin-bottom: 10px; }
    .doc-body ul  { margin: 8px 0 10px 22px; }
    .doc-body li  { margin-bottom: 5px; }
    .doc-body strong { font-weight: bold; }

    .doc-sig {
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
      padding: 9px 18px;
      font-style: italic;
      font-size: 13px;
      color: #3a2800;
    }

    .stamp {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 3px solid var(--red);
      color: var(--red);
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      padding: 4px 10px;
      letter-spacing: 3px;
      transform: rotate(-14deg);
      opacity: 0.65;
      pointer-events: none;
    }

    /* ── PHOTO PLACEHOLDER ───────────────────── */
    .photo-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .photo-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--doc-text);
    }

    .photo-head .doc-cls { margin-bottom: 3px; }

    .photo-frame {
      background: #111;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .photo-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .photo-pending {
      color: var(--amber);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-align: center;
      padding: 28px 20px;
      line-height: 2;
    }

    .photo-annotations {
      background: #1a1200;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
    }

    .photo-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── CHOICES ─────────────────────────────── */
    .choice-box {
      margin-top: 32px;
      padding: 24px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 3px;
    }

    .choice-label {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .choice-prompt {
      font-size: 17px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: #90c490;
      padding: 15px 18px;
      margin-bottom: 11px;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      border-radius: 2px;
    }

    .choice-btn:hover {
      background: #142814;
      border-color: var(--green-mid);
      color: var(--green-bright);
    }

    .choice-key {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    /* ── TRANSITION SCREEN ───────────────────── */
    .transition-screen {
      min-height: 62vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .tr-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }

    .tr-title {
      font-size: 24px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .tr-text {
      max-width: 680px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      margin-bottom: 36px;
    }

    .continue-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .continue-btn:hover { background: #244a24; color: var(--green-bright); }

    /* ── INTRO SCREEN ────────────────────────── */
    .intro-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .intro-eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .intro-title {
      font-size: 36px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 8px;
    }

    .intro-sub {
      font-size: 18px;
      color: var(--amber);
      font-family: 'Courier New', monospace;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    .intro-body {
      max-width: 640px;
      margin: 0 auto 40px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      text-align: left;
    }

    .intro-body p { margin-bottom: 14px; }

    .name-label {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 8px;
    }

    .name-input {
      background: var(--panel);
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 11px 18px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      width: 100%;
      max-width: 400px;
      outline: none;
      border-radius: 2px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .name-input::placeholder { color: var(--green-dim); }
    .name-input:focus { border-color: var(--amber); }

    .start-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 14px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .start-btn:hover { background: #244a24; }

    .error-msg {
      color: #e06050;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: 10px;
    }

    /* ── RESOLUTION ──────────────────────────── */
    .outcome-badge {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 18px;
      border: 2px solid;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .outcome-badge.historical { border-color: var(--amber); color: var(--amber-lit); }
    .outcome-badge.diplomatic { border-color: var(--green-mid); color: var(--green-lit); }
    .outcome-badge.escalation { border-color: var(--red); color: #e06050; }

    .compare-box {
      margin-top: 28px;
      padding: 20px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 2px;
    }

    .compare-box h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .choices-summary { margin-bottom: 14px; }

    .choice-row {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: #7ab07a;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'Courier New', monospace;
    }

    .choice-row:last-child { border-bottom: none; }

    .choice-row .phase-tag {
      color: var(--amber);
      min-width: 80px;
    }

    /* ── RATIONALE ───────────────────────────── */
    .rationale-section { }

    .rationale-prompts {
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      padding: 18px 20px;
      margin-bottom: 18px;
      border-radius: 2px;
    }

    .rationale-prompts h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .rationale-prompts ul {
      margin-left: 20px;
      font-size: 14px;
      color: #7ab07a;
      line-height: 1.9;
    }

    .rationale-textarea {
      width: 100%;
      min-height: 280px;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: var(--green-lit);
      padding: 16px;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .rationale-textarea:focus { border-color: var(--amber); }
    .rationale-textarea::placeholder { color: var(--green-dim); font-style: italic; }

    .submit-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .submit-btn:hover { background: #244a24; }

    /* ── COMPLETE SCREEN ─────────────────────── */
    .complete-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .export-btn {
      background: #1a2a3a;
      border: 1px solid #3a6a9a;
      color: #8ab8d8;
      padding: 15px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
      margin-top: 28px;
    }

    .export-btn:hover { background: #1e3448; }
    .export-btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .pdf-warn,
    .pdf-error {
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.7;
    }

    .pdf-warn { color: var(--amber); }
    .pdf-error { color: var(--red); }

    /* ── AUDIO PLAYER ────────────────────────── */
    .audio-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .audio-still {
      width: 100%;
      height: auto;
      display: block;
    }

    .audio-bar {
      background: #1a1200;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 2px solid var(--doc-border);
    }

    .audio-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .audio-bar audio {
      flex: 1;
      height: 32px;
      min-width: 0;
      accent-color: var(--amber);
      filter: sepia(0.4) brightness(0.9);
    }

    .audio-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── LISTEN BUTTON (TTS) ───────────────── */
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--amber);
      color: var(--amber-lit);
      padding: 6px 14px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 2px;
      margin: 8px 0 4px;
      transition: background 0.15s, color 0.15s;
    }
    .listen-btn:hover { background: #1a2a10; color: #ffe070; }
    .listen-btn.speaking {
      background: var(--amber);
      color: #000;
      border-color: var(--amber-lit);
    }
    .listen-btn.speaking:hover { background: var(--amber-lit); }

    /* ── EXPLANATION MODAL ───────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal-box {
      background: var(--panel);
      border: 2px solid var(--amber);
      border-radius: 4px;
      max-width: 600px;
      width: 100%;
      padding: 28px 24px;
      box-shadow: 0 0 60px rgba(240,176,48,0.15);
    }

    .modal-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .modal-title {
      font-size: 18px;
      color: var(--green-lit);
      margin-bottom: 6px;
    }

    .modal-choice {
      font-size: 14px;
      color: var(--amber-lit);
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #1a1200;
      border-left: 3px solid var(--amber);
    }

    .modal-prompt {
      font-size: 14px;
      color: #7ab07a;
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .modal-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--dark);
      border: 1px solid var(--green-dim);
      color: var(--green-lit);
      padding: 12px;
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      resize: vertical;
      border-radius: 2px;
      margin-bottom: 14px;
    }
    .modal-textarea:focus { border-color: var(--amber); }
    .modal-textarea::placeholder { color: var(--green-dim); font-style: italic; }

    .modal-submit {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 11px 28px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
    }
    .modal-submit:hover { background: #244a24; }

    .modal-err {
      color: #e06050;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-bottom: 10px;
    }

    /* ── SCROLLBAR ───────────────────────────── */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #1e3a1e; border-radius: 4px; }

    @media (max-width: 600px) {
      .ph-title { font-size: 22px; }
      .intro-title { font-size: 26px; }
      .choice-btn { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- ===== ACCESS GATE ===== -->
<div id="access-gate" style="position:fixed;inset:0;z-index:99999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;">
  <div style="text-align:center;max-width:420px;padding:2rem;">
    <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.2em;color:#888;margin-bottom:1.5rem;">Classroom Simulation</div>
    <h1 style="font-size:1.8rem;color:#33ff33;margin:0 0 0.5rem 0;font-family:'Courier New',monospace;">Cuban Missile Crisis</h1>
    <div style="font-size:1rem;color:#999;margin-bottom:2rem;font-family:'Courier New',monospace;">October 1962</div>
    <p style="color:#aaa;font-size:0.9rem;line-height:1.6;margin-bottom:2rem;">Enter the access code provided by your teacher to begin.</p>
    <input id="gate-code" type="text" placeholder="Access Code" autocomplete="off" style="width:100%;box-sizing:border-box;padding:0.75rem 1rem;font-size:1rem;font-family:'Courier New',monospace;background:#0a1a0a;border:1px solid #1a3a1a;color:#33ff33;border-radius:6px;text-align:center;letter-spacing:0.1em;outline:none;" onkeydown="if(event.key==='Enter')checkGate()">
    <button onclick="checkGate()" style="margin-top:1rem;padding:0.75rem 2.5rem;font-size:0.95rem;font-family:'Courier New',monospace;background:#0a1a0a;color:#33ff33;border:1px solid #1a3a1a;border-radius:6px;cursor:pointer;letter-spacing:0.05em;transition:background 0.2s;">Enter Simulation</button>

<script>
/* ==========================================================
   STATE
   ========================================================== */
const state = {
  name: '',
  screen: 'intro',
  mode: 'historical',  // 'historical' or 'alternative'
  choices: {},          // phase (1-4) -> 'A' | 'B' | 'C'
  choiceLabels: {},     // phase -> short label for summary
  explanations: {},     // phase -> student's typed explanation (historical mode)
  transition: null,     // { phase, nextScreen }
  rationale: '',
  comprehension: '',
  // Alt-history adventure state
  altNode: 'root',
  altRound: 1,
  altPath: []
};

const STORAGE_KEY = 'excomm_state_v1';
const UNLOCK_KEY = 'excomm_completed_v1';
const VALID_SCREENS = new Set(['intro', 'phase1', 'transition', 'phase2', 'phase3', 'phase4', 'resolution', 'rationale', 'complete', 'alt']);

function isAltUnlocked() {
  try { return localStorage.getItem(UNLOCK_KEY) === 'true'; } catch(e) { return false; }
}
function markCompleted() {
  try { localStorage.setItem(UNLOCK_KEY, 'true'); } catch(e) {}
}

function persistState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const snapshot = {
      name: state.name,
      screen: state.screen,
      mode: state.mode,
      choices: state.choices,
      choiceLabels: state.choiceLabels,
      explanations: state.explanations,
      transition: state.transition,
      rationale: state.rationale,
      comprehension: state.comprehension,
      altNode: state.altNode,
      altRound: state.altRound,
      altPath: state.altPath
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  } catch (err) {
    console.warn('Unable to save simulation progress.', err);
  }
}

function loadPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    if (!VALID_SCREENS.has(data.screen)) data.screen = 'intro';
    if (data.screen === 'transition' && (!data.transition || typeof data.transition !== 'object')) {
      data.screen = 'phase1';
    }
    Object.assign(state, {
      name: data.name || '',
      screen: data.screen || 'intro',
      mode: data.mode || 'historical',
      choices: data.choices ? { ...data.choices } : {},
      choiceLabels: data.choiceLabels ? { ...data.choiceLabels } : {},
      explanations: data.explanations ? { ...data.explanations } : {},
      transition: data.transition || null,
      rationale: data.rationale || '',
      comprehension: data.comprehension || '',
      altNode: data.altNode || 'root',
      altRound: data.altRound || 1,
      altPath: data.altPath ? [...data.altPath] : []
    });
  } catch (err) {
    console.warn('Unable to load saved simulation progress.', err);
  }
}

function clearPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (err) {
    console.warn('Unable to clear saved simulation progress.', err);
  }
}

/* ==========================================================
   HELPERS
   ========================================================== */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setRoot(html) {
  document.getElementById('root').innerHTML = html;
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function isPdfReady() {
  return Boolean(window.jspdf && window.jspdf.jsPDF);

/* ==========================================================
   TEXT-TO-SPEECH (TTS) — "Listen" buttons for accessibility
   ========================================================== */
let _ttsUtterance = null;
let _ttsActiveBtn = null;

function ttsStop() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  if (_ttsActiveBtn) {
    _ttsActiveBtn.classList.remove('speaking');
    _ttsActiveBtn.innerHTML = '&#x1f50a; LISTEN';
    _ttsActiveBtn = null;
  }
  _ttsUtterance = null;
}

function ttsSpeak(btn, text) {
  if (!window.speechSynthesis) return;

  // If this button is already speaking, stop it
  if (_ttsActiveBtn === btn) {
    ttsStop();
    return;
  }

  // Stop any current speech
  ttsStop();

  // Clean text: strip HTML tags, decode entities, collapse whitespace
  const clean = text
    .replace(/<[^>]*>/g, ' ')
    .replace(/&nbsp;/g, ' ')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"')
    .replace(/&#x27;/g, "'")
    .replace(/\s+/g, ' ')
    .trim();

  _ttsUtterance = new SpeechSynthesisUtterance(clean);
  _ttsUtterance.rate = 0.92;
  _ttsUtterance.pitch = 1.0;

  _ttsActiveBtn = btn;
  btn.classList.add('speaking');
  btn.innerHTML = '&#9632; STOP';

  _ttsUtterance.onend = () => ttsStop();
  _ttsUtterance.onerror = () => ttsStop();

  window.speechSynthesis.speak(_ttsUtterance);
}

function listenBtn(targetId) {
  return `<button class="listen-btn" onclick="ttsSpeak(this, document.getElementById('${targetId}').innerText)">&#x1f50a; LISTEN</button>`;
}

// Stop TTS when navigating between screens
const _origSetRoot = setRoot;
setRoot = function(html) {
  ttsStop();
  _origSetRoot(html);
};

/* ==========================================================
   TIMELINE
   ========================================================== */
const DAYS = [
  { label:'OCT 16', phase:1 },
  { label:'OCT 17', phase:1 },
  { label:'OCT 18', phase:2 },
  { label:'OCT 19', phase:2 },
  { label:'OCT 20', phase:2 },
  { label:'OCT 21', phase:2 },
  { label:'OCT 22', phase:3 },
  { label:'OCT 23', phase:3 },
  { label:'OCT 24', phase:3 },
  { label:'OCT 25', phase:3 },
  { label:'OCT 26', phase:4 },
  { label:'OCT 27', phase:4 },
  { label:'OCT 28', phase:5 },
];

const PHASE_SCREENS = { 1: 'phase1', 2: 'phase2', 3: 'phase3', 4: 'phase4', 5: 'resolution' };

function getHighestVisitedPhase() {
  // Determine highest phase the student has reached based on choices made + current screen
  const choicePhases = Object.keys(state.choices).map(Number);
  let highest = choicePhases.length > 0 ? Math.max(...choicePhases) : 0;
  // If they're on a phase screen, that phase is also visited
  const screenPhaseMap = { phase1:1, phase2:2, phase3:3, phase4:4, resolution:5, rationale:5, complete:5 };
  const currentPhase = screenPhaseMap[state.screen] || 0;
  return Math.max(highest, currentPhase);
}

function navigateToPhase(phase) {
  const screen = PHASE_SCREENS[phase];
  if (!screen) return;
  state.screen = screen;
  state.transition = null;
  render();
}

function renderTimeline(activePhase) {
  const tl = document.getElementById('timeline');
  const highestVisited = getHighestVisitedPhase();
  const showRestart = state.screen !== 'intro';

  tl.innerHTML = '<span class="tl-label">DAYS:</span>' +
    DAYS.map(d => {
      let cls = 'tl-day ';
      const canClick = d.phase <= highestVisited;
      if (d.phase < activePhase) cls += 'done';
      else if (d.phase === activePhase) cls += 'now';
      else cls += 'future';
      if (canClick && d.phase !== activePhase && d.phase < activePhase) {
        return `<span class="${cls}" onclick="navigateToPhase(${d.phase})" title="Return to Phase ${d.phase}">${d.label}</span>`;
      }
      return `<span class="${cls}">${d.label}</span>`;
    }).join('') +
    (showRestart ? '<button class="tl-restart" onclick="confirmRestart()">↺ RESTART</button>' : '');
}

function confirmRestart() {
  if (confirm('Restart the simulation? All choices and progress will be cleared.')) {
    resetSim();
  }
}

/* ==========================================================
   RENDER DISPATCH
   ========================================================== */
function render() {
  persistState();
  scrollTop();
  switch (state.screen) {
    case 'intro':      renderIntro();      break;
    case 'phase1':     renderPhase1();     break;
    case 'transition': renderTransitionScreen(); break;
    case 'phase2':     renderPhase2();     break;
    case 'phase3':     renderPhase3();     break;
    case 'phase4':     renderPhase4();     break;
    case 'resolution': renderResolution(); break;
    case 'rationale':  renderRationale();  break;
    case 'complete':   renderComplete();   break;
    case 'alt':        renderAltAdventure(); break;
  }
}

    epilogue: `<p>The President authorized nuclear strikes against Soviet military positions in Cuba at 7:14 AM. Fourteen tactical nuclear warheads hit the island within ninety minutes. Havana, untouched by the initial targeting, was engulfed in radioactive fallout by afternoon. Castro, broadcasting from a bunker in the Sierra Maestra, declared that Cuba would "fight to the last drop of blood."</p><p>In Moscow, the Presidium convened for what would be its final session. Marshal Malinovsky presented the targeting packages for American cities. Khrushchev, weeping, signed the authorization at 11:30 AM Moscow time. "God will not forgive us," he whispered. "But history will understand."</p><p>The first Soviet ICBMs hit their targets — Omaha, Nebraska (SAC headquarters) and Washington, D.C. — at 2:47 PM Eastern time. NATO's automatic response protocols launched within minutes. By nightfall, an estimated 200 nuclear warheads had detonated across North America, Europe, and the Soviet Union.</p><p>There was no formal surrender. There was no one left with the authority to surrender. The war lasted less than twelve hours. Its consequences would last for centuries.</p>` },
