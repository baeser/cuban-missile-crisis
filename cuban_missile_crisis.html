<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXCOMM Briefing System — Cuban Missile Crisis 1962</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" id="jspdf-lib" onerror="window.__jsPdfLoadError = true;"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:       #080d08;
      --panel:      #0f1a0f;
      --panel2:     #141f14;
      --border:     #1e3a1e;
      --green-dim:  #3a6a3a;
      --green-mid:  #5a9a5a;
      --green-lit:  #a8d4a8;
      --green-bright:#d4f4d4;
      --amber:      #d4900a;
      --amber-lit:  #f0b030;
      --red:        #c0392b;
      --red-dark:   #8b0000;
      --doc-bg:     #f0e9d8;
      --doc-border: #8b7050;
      --doc-head:   #e4dcc8;
      --doc-text:   #1a1208;
    }

    body {
      background: var(--dark);
      color: var(--green-lit);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── CHROME ──────────────────────────────── */
    .cls-banner {
      background: var(--red-dark);
      color: #fff;
      text-align: center;
      padding: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      font-weight: bold;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hdr-left {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-mid);
      letter-spacing: 2px;
    }

    .hdr-right {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 1px;
    }

    .timeline-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
    }

    .tl-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      margin-right: 6px;
      white-space: nowrap;
    }

    .tl-day {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--green-dim);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      white-space: nowrap;
    }

    .tl-day.done  { background: #0a1e0a; color: var(--green-dim); border-color: #1e3a1e; }
    .tl-day.now   { background: #1a3a1a; color: var(--green-lit); border-color: var(--green-mid); font-weight: bold; }
    .tl-day.future{ opacity: 0.35; }

    /* ── LAYOUT ──────────────────────────────── */
    .main {
      max-width: 860px;
      margin: 30px auto;
      padding: 0 20px 60px;
    }

    /* ── PHASE HEADER ────────────────────────── */
    .ph-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .ph-title {
      font-size: 28px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 12px;
    }

    .ph-context {
      font-size: 15px;
      color: #7ab07a;
      font-style: italic;
      border-left: 3px solid var(--green-dim);
      padding-left: 16px;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    /* ── DOCUMENTS ───────────────────────────── */
    .doc {
      background: var(--doc-bg);
      color: var(--doc-text);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }

    .doc-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .doc-cls {
      color: var(--red);
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }

    .doc-meta { color: #3a2800; line-height: 1.7; }
    .doc-meta span { display: block; }

    .doc-body {
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.85;
    }

    .doc-body p   { margin-bottom: 10px; }
    .doc-body ul  { margin: 8px 0 10px 22px; }
    .doc-body li  { margin-bottom: 5px; }
    .doc-body strong { font-weight: bold; }

    .doc-sig {
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
      padding: 9px 18px;
      font-style: italic;
      font-size: 13px;
      color: #3a2800;
    }

    .stamp {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 3px solid var(--red);
      color: var(--red);
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      padding: 4px 10px;
      letter-spacing: 3px;
      transform: rotate(-14deg);
      opacity: 0.65;
      pointer-events: none;
    }

    /* ── PHOTO PLACEHOLDER ───────────────────── */
    .photo-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .photo-head {
      background: var(--doc-head);
      border-bottom: 2px solid var(--doc-border);
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--doc-text);
    }

    .photo-head .doc-cls { margin-bottom: 3px; }

    .photo-frame {
      background: #111;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .photo-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .photo-pending {
      color: var(--amber);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-align: center;
      padding: 28px 20px;
      line-height: 2;
    }

    .photo-annotations {
      background: #1a1200;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
    }

    .photo-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── CHOICES ─────────────────────────────── */
    .choice-box {
      margin-top: 32px;
      padding: 24px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 3px;
    }

    .choice-label {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .choice-prompt {
      font-size: 17px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: #90c490;
      padding: 15px 18px;
      margin-bottom: 11px;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      border-radius: 2px;
    }

    .choice-btn:hover {
      background: #142814;
      border-color: var(--green-mid);
      color: var(--green-bright);
    }

    .choice-key {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    /* ── TRANSITION SCREEN ───────────────────── */
    .transition-screen {
      min-height: 62vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .tr-meta {
      font-family: 'Courier New', monospace;
      color: var(--amber);
      font-size: 11px;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }

    .tr-title {
      font-size: 24px;
      color: var(--green-lit);
      margin-bottom: 22px;
    }

    .tr-text {
      max-width: 680px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      margin-bottom: 36px;
    }

    .continue-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .continue-btn:hover { background: #244a24; color: var(--green-bright); }

    /* ── INTRO SCREEN ────────────────────────── */
    .intro-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .intro-eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .intro-title {
      font-size: 36px;
      color: var(--green-lit);
      font-weight: normal;
      margin-bottom: 8px;
    }

    .intro-sub {
      font-size: 18px;
      color: var(--amber);
      font-family: 'Courier New', monospace;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    .intro-body {
      max-width: 640px;
      margin: 0 auto 40px;
      font-size: 15px;
      color: #7ab07a;
      line-height: 1.85;
      text-align: left;
    }

    .intro-body p { margin-bottom: 14px; }

    .name-label {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 8px;
    }

    .name-input {
      background: var(--panel);
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 11px 18px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      width: 100%;
      max-width: 400px;
      outline: none;
      border-radius: 2px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .name-input::placeholder { color: var(--green-dim); }
    .name-input:focus { border-color: var(--amber); }

    .start-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 14px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .start-btn:hover { background: #244a24; }

    .error-msg {
      color: #e06050;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: 10px;
    }

    /* ── RESOLUTION ──────────────────────────── */
    .outcome-badge {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 18px;
      border: 2px solid;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .outcome-badge.historical { border-color: var(--amber); color: var(--amber-lit); }
    .outcome-badge.diplomatic { border-color: var(--green-mid); color: var(--green-lit); }
    .outcome-badge.escalation { border-color: var(--red); color: #e06050; }

    .compare-box {
      margin-top: 28px;
      padding: 20px;
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      border-radius: 2px;
    }

    .compare-box h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .choices-summary { margin-bottom: 14px; }

    .choice-row {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: #7ab07a;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'Courier New', monospace;
    }

    .choice-row:last-child { border-bottom: none; }

    .choice-row .phase-tag {
      color: var(--amber);
      min-width: 80px;
    }

    /* ── RATIONALE ───────────────────────────── */
    .rationale-section { }

    .rationale-prompts {
      background: var(--panel2);
      border: 1px solid var(--green-dim);
      padding: 18px 20px;
      margin-bottom: 18px;
      border-radius: 2px;
    }

    .rationale-prompts h3 {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .rationale-prompts ul {
      margin-left: 20px;
      font-size: 14px;
      color: #7ab07a;
      line-height: 1.9;
    }

    .rationale-textarea {
      width: 100%;
      min-height: 280px;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      color: var(--green-lit);
      padding: 16px;
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .rationale-textarea:focus { border-color: var(--amber); }
    .rationale-textarea::placeholder { color: var(--green-dim); font-style: italic; }

    .submit-btn {
      background: #1a3a1a;
      border: 1px solid var(--green-mid);
      color: var(--green-lit);
      padding: 13px 36px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .submit-btn:hover { background: #244a24; }

    /* ── COMPLETE SCREEN ─────────────────────── */
    .complete-screen {
      text-align: center;
      padding: 50px 20px;
    }

    .export-btn {
      background: #1a2a3a;
      border: 1px solid #3a6a9a;
      color: #8ab8d8;
      padding: 15px 48px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 2px;
      margin-top: 28px;
    }

    .export-btn:hover { background: #1e3448; }
    .export-btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .pdf-warn,
    .pdf-error {
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.7;
    }

    .pdf-warn { color: var(--amber); }
    .pdf-error { color: var(--red); }

    /* ── AUDIO PLAYER ────────────────────────── */
    .audio-wrap {
      background: var(--doc-bg);
      border: 1px solid var(--doc-border);
      margin-bottom: 22px;
      box-shadow: 4px 4px 18px rgba(0,0,0,0.6);
    }

    .audio-still {
      width: 100%;
      height: auto;
      display: block;
    }

    .audio-bar {
      background: #1a1200;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 2px solid var(--doc-border);
    }

    .audio-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--amber-lit);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .audio-bar audio {
      flex: 1;
      height: 32px;
      min-width: 0;
      accent-color: var(--amber);
      filter: sepia(0.4) brightness(0.9);
    }

    .audio-caption {
      padding: 10px 16px;
      font-size: 12px;
      color: #5a4020;
      font-style: italic;
      background: var(--doc-head);
      border-top: 1px solid var(--doc-border);
    }

    /* ── SCROLLBAR ───────────────────────────── */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #1e3a1e; border-radius: 4px; }

    @media (max-width: 600px) {
      .ph-title { font-size: 22px; }
      .intro-title { font-size: 26px; }
      .choice-btn { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="cls-banner">TOP SECRET — EYES ONLY — EXECUTIVE COMMITTEE OF THE NATIONAL SECURITY COUNCIL</div>

<header>
  <div class="hdr-left">EXCOMM BRIEFING SYSTEM &nbsp;|&nbsp; NSC / WHITEHOUSE</div>
  <div class="hdr-right" id="hdr-date">OCTOBER 1962 &nbsp;|&nbsp; WASHINGTON D.C.</div>
</header>

<div class="timeline-bar" id="timeline">
  <span class="tl-label">DAYS:</span>
  <!-- populated by JS -->
</div>

<div class="main" id="root">
  <!-- rendered by JS -->
</div>

<script>
/* ==========================================================
   STATE
   ========================================================== */
const state = {
  name: '',
  screen: 'intro',
  choices: {},        // phase (1-4) -> 'A' | 'B' | 'C'
  choiceLabels: {},   // phase -> short label for summary
  transition: null,   // { title, text, nextScreen }
  outcome: '',        // 'historical' | 'diplomatic' | 'escalation'
  rationale: ''
};

const STORAGE_KEY = 'excomm_state_v1';
const VALID_SCREENS = new Set(['intro', 'phase1', 'transition', 'phase2', 'phase3', 'phase4', 'resolution', 'rationale', 'complete']);

function persistState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const snapshot = {
      name: state.name,
      screen: state.screen,
      choices: state.choices,
      choiceLabels: state.choiceLabels,
      transition: state.transition,
      outcome: state.outcome,
      rationale: state.rationale
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  } catch (err) {
    console.warn('Unable to save simulation progress.', err);
  }
}

function loadPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    if (!VALID_SCREENS.has(data.screen)) data.screen = 'intro';
    if (data.screen === 'transition' && (!data.transition || typeof data.transition !== 'object')) {
      data.screen = 'phase1';
    }
    Object.assign(state, {
      name: data.name || '',
      screen: data.screen || 'intro',
      choices: data.choices ? { ...data.choices } : {},
      choiceLabels: data.choiceLabels ? { ...data.choiceLabels } : {},
      transition: data.transition || null,
      outcome: data.outcome || '',
      rationale: data.rationale || ''
    });
  } catch (err) {
    console.warn('Unable to load saved simulation progress.', err);
  }
}

function clearPersistedState() {
  if (typeof localStorage === 'undefined') return;
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (err) {
    console.warn('Unable to clear saved simulation progress.', err);
  }
}

/* ==========================================================
   HELPERS
   ========================================================== */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setRoot(html) {
  document.getElementById('root').innerHTML = html;
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function isPdfReady() {
  return Boolean(window.jspdf && window.jspdf.jsPDF);
}

/* ==========================================================
   TIMELINE
   ========================================================== */
const DAYS = [
  { label:'OCT 16', phase:1 },
  { label:'OCT 17', phase:1 },
  { label:'OCT 18', phase:2 },
  { label:'OCT 19', phase:2 },
  { label:'OCT 20', phase:2 },
  { label:'OCT 21', phase:2 },
  { label:'OCT 22', phase:3 },
  { label:'OCT 23', phase:3 },
  { label:'OCT 24', phase:3 },
  { label:'OCT 25', phase:3 },
  { label:'OCT 26', phase:4 },
  { label:'OCT 27', phase:4 },
  { label:'OCT 28', phase:5 },
];

function renderTimeline(activePhase) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '<span class="tl-label">DAYS:</span>' +
    DAYS.map(d => {
      let cls = 'tl-day ';
      if (d.phase < activePhase) cls += 'done';
      else if (d.phase === activePhase) cls += 'now';
      else cls += 'future';
      return `<span class="${cls}">${d.label}</span>`;
    }).join('');
}

/* ==========================================================
   OUTCOME CALCULATION
   ========================================================== */
function calculateOutcome() {
  const c = state.choices;
  let agg = 0;
  let dip = 0;
  if (c[1] === 'A') agg += 2;
  if (c[1] === 'C') dip += 2;
  if (c[2] === 'B') agg += 2;
  if (c[2] === 'C') dip += 1;
  if (c[3] === 'A') agg += 1;
  if (c[3] === 'C') dip += 1;
  if (c[4] === 'C') agg += 3;
  if (c[4] === 'B') dip += 1;
  if (agg >= 4) return 'escalation';
  if (dip >= 3 && agg <= 1) return 'diplomatic';
  return 'historical';
}

/* ==========================================================
   RENDER DISPATCH
   ========================================================== */
function render() {
  persistState();
  scrollTop();
  switch (state.screen) {
    case 'intro':      renderIntro();      break;
    case 'phase1':     renderPhase1();     break;
    case 'transition': renderTransitionScreen(); break;
    case 'phase2':     renderPhase2();     break;
    case 'phase3':     renderPhase3();     break;
    case 'phase4':     renderPhase4();     break;
    case 'resolution': renderResolution(); break;
    case 'rationale':  renderRationale();  break;
    case 'complete':   renderComplete();   break;
  }
}

/* ==========================================================
   INTRO
   ========================================================== */
function renderIntro() {
  renderTimeline(0);
  setRoot(`
    <div class="intro-screen">
      <div class="intro-eyebrow">NATIONAL SECURITY COUNCIL — 1962</div>
      <div class="intro-title">CUBAN MISSILE CRISIS</div>
      <div class="intro-sub">EXCOMM ADVISORY SIMULATION</div>
      <div class="intro-body">
        <p>October 1962. The Cold War is at its most dangerous. For fifteen years, the United States and the Soviet Union have stockpiled enough nuclear weapons to destroy civilization many times over. Now, the two superpowers are about to confront each other directly — 90 miles off the coast of Florida.</p>
        <p>You have been appointed as a senior advisor to President John F. Kennedy's <strong>Executive Committee of the National Security Council — EXCOMM</strong>. Your role: read classified intelligence, study the documents, and recommend a course of action that may determine whether humanity survives.</p>
        <p>Your choices across four critical decision points will directly affect how the crisis unfolds. Read carefully. History is watching.</p>
        <p style="color: var(--amber); font-style:normal;"><strong>Everything you read in this simulation is based on real events, real documents, and real decisions made in October 1962.</strong></p>
      </div>
      <label class="name-label" for="sname">ENTER YOUR NAME TO BEGIN:</label>
      <input class="name-input" id="sname" type="text" placeholder="Last Name, First Name" maxlength="60" autocomplete="off" value="${esc(state.name)}">
      <div id="name-err" class="error-msg"></div>
      <br>
      <button class="start-btn" onclick="startSim()">▶ &nbsp; BEGIN BRIEFING</button>
    </div>
  `);
}

function startSim() {
  const n = document.getElementById('sname').value.trim();
  if (!n) {
    document.getElementById('name-err').textContent = '⚠ NAME REQUIRED TO PROCEED';
    return;
  }
  state.name = n;
  state.screen = 'phase1';
  render();
}

function makeChoice(phase, choice) {
  state.choices[phase] = choice;

  const labelMap = {
    1: { A: 'Air Strikes', B: 'Naval Quarantine', C: 'Secret Diplomacy' },
    2: { A: 'Naval Quarantine Announcement', B: '24-Hour Ultimatum', C: 'UN Mediation Request' },
    3: { A: 'Full Quarantine Enforcement', B: 'Measured Enforcement', C: 'UN Standdown' },
    4: { A: 'Trollope Ploy', B: 'Public Turkey Trade', C: 'Retaliate for U-2 Shootdown' }
  };
  state.choiceLabels[phase] = labelMap[phase][choice];

  const key = `${phase}${choice}`;
  const tr = TRANSITIONS[key];

  const nextScreens = { 1: 'phase2', 2: 'phase3', 3: 'phase4', 4: 'resolution' };

  state.transition = {
    title: tr.title,
    text: tr.text,
    nextScreen: nextScreens[phase]
  };

  if (phase === 4) {
    state.outcome = calculateOutcome();
  }

  state.screen = 'transition';
  render();
}

}

function advanceFromTransition() {
  state.screen = state.transition.nextScreen;

}

  const text = document.getElementById('rationale-text').value.trim();
  if (text.length < 50) {
    document.getElementById('rationale-err').textContent = '⚠ Please write a more complete analysis (at least a few sentences) before submitting.';
    return;
  }
  state.rationale = text;
  state.screen = 'complete';
  render();
}

function handleRationaleInput(value) {
  state.rationale = value;
  persistState();
}

/* ==========================================================
   COMPLETE SCREEN
   ========================================================== */
function renderComplete() {
  renderTimeline(5);
  const pdfReady = isPdfReady();
  const pdfErrored = Boolean(window.__jsPdfLoadError);
  const exportAttrs = (!pdfReady || pdfErrored) ? 'disabled aria-disabled=\"true\"' : '';
  let pdfStatus = '';
  if (pdfErrored) {
    pdfStatus = '<p class=\"pdf-error\">PDF generator failed to load. Check your connection and reload the page to try again.</p>';
  } else if (!pdfReady) {
    pdfStatus = '<p class=\"pdf-warn\">PDF generator is still loading. Once it finishes, the download button will unlock automatically.</p>';
  }
  setRoot(`
    <div class="complete-screen">
      <div class="intro-eyebrow">SIMULATION COMPLETE</div>
      <div class="intro-title" style="margin-bottom:10px;">Advisory Report Ready</div>
      <div class="intro-sub" style="margin-bottom:30px;">EXCOMM — OCTOBER 1962</div>
      <div class="intro-body" style="text-align:center;">
        <p>Your advisory record has been logged. Click below to download a PDF report of your choices, the simulation outcome, and your written analysis.</p>
        <p style="color:var(--amber);">Save this file and submit it to your teacher as directed.</p>
      </div>
      <button class="export-btn" onclick="exportPDF()" ${exportAttrs}>⬇ &nbsp; DOWNLOAD PDF REPORT</button>
      ${pdfStatus}
      <br><br>
      <button class="continue-btn" style="margin-top:10px;" onclick="resetSim()">↺ &nbsp; RESTART SIMULATION</button>
    </div>
  `);
}

function resetSim() {
  Object.assign(state, {
    name: '', screen: 'intro', choices: {}, choiceLabels: {},
    transition: null, outcome: '', rationale: ''
  });
  clearPersistedState();
  render();
}

/* ==========================================================
   PDF EXPORT
   ========================================================== */
function exportPDF() {
  if (!isPdfReady()) {
    const msg = window.__jsPdfLoadError
      ? 'The PDF generator could not be loaded. Please check your internet connection and reload the page.'
      : 'The PDF generator is still loading. Please wait a moment and try again.';
    alert(msg);
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  const PW = 612, PH = 792;
  const ML = 60, MR = 60, MT = 60;
  const TW = PW - ML - MR;
  let y = MT;

  const LINE = (x1, y1, x2, y2, r, g, b) => {
    doc.setDrawColor(r, g, b);
    doc.line(x1, y1, x2, y2);
  };

  const TEXT = (text, x, yPos, size, r, g, b, style = 'normal', align = 'left') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    doc.text(text, x, yPos, { align });
  };

  const BLOCK = (text, x, yPos, maxW, size, r, g, b, style = 'normal') => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('times', style);
    const lines = doc.splitTextToSize(text, maxW);
    doc.text(lines, x, yPos);
    return lines.length * (size * 1.35);
  };

  function checkPage(needed = 40) {
    if (y + needed > PH - 50) {
      doc.addPage();
      y = MT;
    }
  }

  const startAnalysisPage = (isContinuation = false) => {
    doc.addPage();
    doc.setFillColor(139, 0, 0);
    doc.rect(0, 0, PW, 28, 'F');
    TEXT('TOP SECRET — EYES ONLY', PW / 2, 18, 8, 255, 255, 255, 'bold', 'center');

    y = 65;
    const heading = isContinuation ? 'SECTION III — STUDENT ANALYSIS (CONT.)' : 'SECTION III — STUDENT ANALYSIS';
    TEXT(heading, ML, y, 14, 30, 60, 30, 'bold');
    y += 6;
    LINE(ML, y, PW - MR, y, 150, 130, 90);
    y += 18;

    if (!isContinuation) {
      TEXT(`Advisor: ${state.name}`, ML, y, 11, 80, 60, 0);
      y += 26;
    }
  };

  // ── PAGE 1: COVER ────────────────────────────────────────
  // Red top banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, 0, PW, 28, 'F');
  TEXT('TOP SECRET — EYES ONLY — EXECUTIVE COMMITTEE OF THE NATIONAL SECURITY COUNCIL',
    PW / 2, 18, 7.5, 255, 255, 255, 'bold', 'center');

  y = 70;
  LINE(ML, y, PW - MR, y, 60, 30, 0);
  y += 16;
  TEXT('ADVISORY SIMULATION REPORT', PW / 2, y, 11, 100, 70, 0, 'normal', 'center');
  y += 8;
  LINE(ML, y, PW - MR, y, 60, 30, 0);

  y += 50;
  TEXT('CUBAN MISSILE CRISIS', PW / 2, y, 28, 30, 60, 30, 'bold', 'center');
  y += 32;
  TEXT('EXCOMM Advisory Simulation', PW / 2, y, 16, 60, 100, 60, 'italic', 'center');
  y += 14;
  TEXT('October 16 – 28, 1962', PW / 2, y, 13, 80, 60, 0, 'normal', 'center');

  y += 50;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  y += 24;
  TEXT('STUDENT ADVISOR:', ML, y, 11, 80, 60, 0, 'bold');
  y += 17;
  TEXT(state.name, ML + 20, y, 15, 20, 20, 20, 'bold');

  y += 24;
  TEXT('SIMULATION DATE:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), ML + 20, y, 12, 40, 40, 40);

  const outcomeLabels = {
    historical: 'Historical Path — Aligned with Kennedy\'s Actual Decisions',
    diplomatic: 'Diplomatic Path — More Conciliatory Than Kennedy\'s Approach',
    escalation: 'Escalation Path — More Aggressive Than Kennedy\'s Approach'
  };
  y += 24;
  TEXT('OUTCOME TRACK:', ML, y, 11, 80, 60, 0);
  y += 15;
  TEXT(outcomeLabels[state.outcome] || state.outcome, ML + 20, y, 12, 40, 40, 40);

  y += 45;
  LINE(ML, y, PW - MR, y, 180, 160, 120);

  // ── ADVISORY RECORD ──
  y += 28;
  TEXT('SECTION I — ADVISORY RECORD', ML, y, 14, 30, 60, 30, 'bold');
  y += 6;
  LINE(ML, y, PW - MR, y, 150, 130, 90);
  y += 18;

  const phaseData = [
    { num: 1, date: 'Oct 16', label: 'Initial Response to Discovery' },
    { num: 2, date: 'Oct 17–19', label: 'Kennedy\'s Public Address' },
    { num: 3, date: 'Oct 22–25', label: 'Soviet Ships at Quarantine Line' },
    { num: 4, date: 'Oct 27', label: 'Black Saturday Response' }
  ];

  phaseData.forEach(ph => {
    checkPage(50);
    TEXT(`PHASE ${ph.num} — ${ph.date}`, ML, y, 10, 139, 0, 0, 'bold');
    y += 13;
    TEXT(`Decision Point: ${ph.label}`, ML + 10, y, 10, 60, 50, 0);
    y += 13;
    const choice = state.choiceLabels[ph.num] || 'N/A';
    TEXT(`Recommendation: ${choice}`, ML + 10, y, 11, 20, 20, 20, 'bold');
    y += 20;
    LINE(ML, y, PW - MR, y, 200, 190, 170);
    y += 14;
  });

  // ── OUTCOME NARRATIVE ──
  checkPage(60);
  y += 10;
  TEXT('SECTION II — SIMULATION OUTCOME', ML, y, 14, 30, 60, 30, 'bold');
  y += 6;
  LINE(ML, y, PW - MR, y, 150, 130, 90);
  y += 18;

  const outcomeText = OUTCOMES[state.outcome];
  if (outcomeText) {
    TEXT(outcomeText.title, ML, y, 12, 20, 20, 20, 'bold');
    y += 18;
    // Strip HTML tags for PDF
    const cleanOutcome = outcomeText.compare.replace(/<[^>]*>/g, '');
    const oh = BLOCK(`Historical Comparison: ${cleanOutcome}`, ML, y, TW, 11, 50, 50, 50);
    y += oh + 14;
  }

  // ── PAGE 2: RATIONALE ────────────────────────────────────
  startAnalysisPage(false);

  const rationaleClean = (state.rationale || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
  const rationaleText = rationaleClean || 'No analysis submitted.';
  const rationaleLines = doc.splitTextToSize(rationaleText, TW);
  const rationaleLineHeight = 12 * 1.35;

  doc.setFontSize(12);
  doc.setTextColor(20, 20, 20);
  doc.setFont('times', 'normal');

  rationaleLines.forEach(line => {
    if (y + rationaleLineHeight > PH - 60) {
      startAnalysisPage(true);
      doc.setFontSize(12);
      doc.setTextColor(20, 20, 20);
      doc.setFont('times', 'normal');
    }
    doc.text(line, ML, y);
    y += rationaleLineHeight;
  });

  y += 30;

  // Footer on last page
  LINE(ML, y, PW - MR, y, 180, 160, 120);
  y += 16;
  TEXT('Cuban Missile Crisis EXCOMM Simulation — Educational Use Only', PW / 2, y, 9, 120, 100, 60, 'italic', 'center');
  y += 13;
  TEXT(`Based on declassified historical records. Completed: ${new Date().toLocaleString()}`, PW / 2, y, 9, 120, 100, 60, 'italic', 'center');

  // Red bottom banner
  doc.setFillColor(139, 0, 0);
  doc.rect(0, PH - 24, PW, 24, 'F');
  TEXT('TOP SECRET — EYES ONLY', PW / 2, PH - 9, 8, 255, 255, 255, 'bold', 'center');

  // Save
  const fname = `EXCOMM_Report_${state.name.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
  doc.save(fname);
}

/* ==========================================================
   INIT
   ========================================================== */
loadPersistedState();
render();
window.addEventListener('load', () => {
  if (state.screen === 'complete' && isPdfReady()) {
    render();
  }
});
</script>
</body>
</html>
